<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Modulo Personal Training – Thomas Bresciani</title>
    <link rel="icon" type="image/jpeg" href="images/logo-tb---nero.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }

        .viewer-header {
            background: #1a1a1a; color: #fff; padding: 0.8rem 1rem;
            display: flex; align-items: center; gap: 0.8rem;
            position: sticky; top: 0; z-index: 10;
        }
        .viewer-header img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; }
        .viewer-header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
        .viewer-header a { color: #aaa; text-decoration: none; font-size: 0.85rem; }

        .viewer-actions {
            display: flex; gap: 0.6rem; padding: 0.8rem 1rem;
            background: #fff; border-bottom: 1px solid #e5e7eb;
            justify-content: center; flex-wrap: wrap;
        }
        .viewer-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.7rem 1.4rem; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .viewer-btn:active { transform: scale(0.97); }
        .btn-print { background: #2563eb; color: #fff; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
        .btn-download { background: #f3f4f6; color: #1a1a1a; }

        .pdf-container { flex: 1; display: flex; justify-content: center; padding: 1rem; }
        .pdf-container iframe,
        .pdf-container object { width: 100%; max-width: 900px; height: 80vh; border: none; border-radius: 8px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }

        .pdf-fallback {
            text-align: center; padding: 3rem 1.5rem;
            max-width: 400px; margin: 2rem auto;
        }
        .pdf-fallback p { color: #6b7280; margin-bottom: 1.2rem; line-height: 1.5; }

        /* Nasconde header e actions in stampa, stampa solo il PDF */
        @media print {
            .viewer-header, .viewer-actions, .pdf-fallback { display: none !important; }
            body { background: #fff; }
            .pdf-container { padding: 0; }
            .pdf-container iframe, .pdf-container object {
                width: 100%; height: 100vh; max-width: none;
                box-shadow: none; border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="viewer-header">
        <img src="images/logo-tb---nero.jpg" alt="Logo">
        <h1>Modulo Personal Training</h1>
        <a href="prenotazioni.html">← Indietro</a>
    </div>

    <div class="viewer-actions">
        <button class="viewer-btn btn-print" onclick="stampaPDF()">🖨️ Stampa</button>
        <a class="viewer-btn btn-download" href="modulo_personal_training.pdf" download>📥 Scarica PDF</a>
    </div>

    <div class="pdf-container" id="pdfContainer"></div>

    <script>
    (function() {
        var container = document.getElementById('pdfContainer');
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        if (isIOS) {
            // iOS Safari non renderizza PDF in iframe/object — mostra fallback
            container.innerHTML =
                '<div class="pdf-fallback">' +
                    '<p>Safari non supporta la visualizzazione PDF inline.<br>' +
                    'Usa i bottoni qui sopra per <strong>stampare</strong> o <strong>scaricare</strong> il modulo.</p>' +
                    '<a class="viewer-btn btn-download" href="modulo_personal_training.pdf" download ' +
                       'style="display:inline-flex;text-decoration:none">📥 Scarica PDF</a>' +
                '</div>';
        } else {
            // Desktop / Android — embed PDF
            container.innerHTML =
                '<iframe src="modulo_personal_training.pdf#toolbar=1" ' +
                    'title="Modulo Personal Training"></iframe>';
        }
    })();

    function stampaPDF() {
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        if (isIOS) {
            // Su iOS apriamo il PDF direttamente — Safari mostra il suo viewer con opzione condividi/stampa
            window.location.href = 'modulo_personal_training.pdf';
            return;
        }

        // Desktop/Android: stampa il PDF tramite iframe nascosto
        var printFrame = document.getElementById('printFrame');
        if (!printFrame) {
            printFrame = document.createElement('iframe');
            printFrame.id = 'printFrame';
            printFrame.style.position = 'fixed';
            printFrame.style.right = '0';
            printFrame.style.bottom = '0';
            printFrame.style.width = '0';
            printFrame.style.height = '0';
            printFrame.style.border = 'none';
            printFrame.src = 'modulo_personal_training.pdf';
            document.body.appendChild(printFrame);
            printFrame.onload = function() {
                printFrame.contentWindow.focus();
                printFrame.contentWindow.print();
            };
        } else {
            printFrame.contentWindow.focus();
            printFrame.contentWindow.print();
        }
    }
    </script>
</body>
</html>
