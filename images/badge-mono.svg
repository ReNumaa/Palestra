<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Dumbbell outline - monocromatico bianco su trasparente -->

  <!-- Barra centrale (impugnatura) -->
  <rect x="30" y="43" width="36" height="10" rx="5" fill="none" stroke="white" stroke-width="4"/>

  <!-- Peso sinistro esterno -->
  <rect x="6" y="28" width="12" height="40" rx="3" fill="none" stroke="white" stroke-width="4"/>

  <!-- Peso sinistro interno -->
  <rect x="20" y="33" width="10" height="30" rx="3" fill="none" stroke="white" stroke-width="4"/>

  <!-- Peso destro interno -->
  <rect x="66" y="33" width="10" height="30" rx="3" fill="none" stroke="white" stroke-width="4"/>

  <!-- Peso destro esterno -->
  <rect x="78" y="28" width="12" height="40" rx="3" fill="none" stroke="white" stroke-width="4"/>

  <!-- Connettori tra pesi e barra -->
  <rect x="18" y="45" width="2" height="6" fill="white"/>
  <rect x="76" y="45" width="2" height="6" fill="white"/>
</svg>
