<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Bilanciere stilizzato con T centrale - monocromatico bianco su trasparente -->

  <!-- Barra orizzontale centrale del bilanciere -->
  <rect x="8" y="40" width="80" height="8" rx="2" fill="white"/>

  <!-- Dischi sinistri (ultima = più esterna, più corta) -->
  <rect x="10" y="28" width="6" height="32" rx="2" fill="white"/>
  <rect x="19" y="20" width="6" height="48" rx="2" fill="white"/>
  <rect x="28" y="20" width="6" height="48" rx="2" fill="white"/>

  <!-- Dischi destri (ultima = più esterna, più corta) -->
  <rect x="62" y="20" width="6" height="48" rx="2" fill="white"/>
  <rect x="71" y="20" width="6" height="48" rx="2" fill="white"/>
  <rect x="80" y="28" width="6" height="32" rx="2" fill="white"/>

  <!-- Gambo verticale della T (sotto la barra) -->
  <rect x="44" y="40" width="8" height="28" rx="2" fill="white"/>
</svg>
