    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.1/dist/umd/supabase.min.js" integrity="sha384-nBSomYN4UWX4we7Pw5GsQDkjtwLh2Wde+3szWl5Lzf0zuN9XncHIZLNoucos4C7f" crossorigin="anonymous"></script>

    <script>
        let _allView = 'scheda';
        let _allPlan = null;
        let _allPlans = [];  // tutte le schede (attive e vecchie)
        let _allLogs = [];
        let _activeDay = null;  // giorno selezionato (session picker)
        let _nextBookings = []; // prossime prenotazioni confermate
        let _filterPeriod = 'all';
        let _filterMuscle = 'all';
        let _allLastRefreshTs = Date.now(); // aggiornato ad ogni _refreshAllenamentoData
        // Incrementato ogni volta che l'app va in background.
        // I catch di saveLog/saveEditExercise lo confrontano col valore
        // al momento della chiamata: se diverso → siamo andati in background
        // → il flush gestisce, nessun falso errore.
        let _bgGeneration = 0;

        // ── Pending workout operations queue ──────────────────────────────────
        // Operazioni scritte localmente PRIMA di inviare a Supabase.
        // Se l'app va in background durante il salvataggio, le operazioni
        // restano in coda e vengono reintentate al ritorno (visibilitychange,
        // pageshow, online). Le write sono idempotenti:
        //   saveLog           → upsert (exercise_id, user_id, log_date, set_number)
        //   saveEditExercise  → update by id
        const _PENDING_OPS_KEY = 'pt_pending_workout_ops';
        function _getOpsQueue() {
            try { return JSON.parse(localStorage.getItem(_PENDING_OPS_KEY) || '[]'); }
            catch (e) { return []; }
        }
        function _saveOpsQueue(q) {
            try { localStorage.setItem(_PENDING_OPS_KEY, JSON.stringify(q)); }
            catch (e) { console.warn('[PendingOps] localStorage write failed:', e); }
        }
        // Aggiunge o sovrascrive per id (dedup: l'ultima versione vince)
        function _enqueueOp(op) {
            const q = _getOpsQueue();
            const idx = q.findIndex(o => o.id === op.id);
            if (idx >= 0) q[idx] = op; else q.push(op);
            _saveOpsQueue(q);
        }
        function _dequeueOp(opId) { _saveOpsQueue(_getOpsQueue().filter(o => o.id !== opId)); }
        function _hasPendingOp(opId) { return _getOpsQueue().some(o => o.id === opId); }

        // Restituisce il numero di operazioni completate con successo
        async function flushPendingWorkoutOps() {
            const q = _getOpsQueue();
            if (!q.length) return 0;
            const user = getCurrentUser();
            if (!user) return 0;
            let flushed = 0;
            console.log(`[PendingOps] flush: ${q.length} op(s) pendenti`);
            for (const op of [...q]) {
                try {
                    if (op.type === 'save_log') {
                        for (const s of op.sets) {
                            await WorkoutLogStorage.logSet({
                                exercise_id: op.exerciseId,
                                user_id: op.userId,
                                log_date: op.logDate,
                                set_number: s.setNumber,
                                reps_done: s.repsDone,
                                weight_done: s.weightDone,
                                rest_done: s.restDone,
                                rpe: s.rpe,
                            });
                        }
                        _dequeueOp(op.id);
                        flushed++;
                        console.log('[PendingOps] save_log completato:', op.exerciseId, op.logDate);
                    } else if (op.type === 'save_edit_exercise') {
                        await WorkoutPlanStorage.updateExercise(op.exId, op.updates);
                        _dequeueOp(op.id);
                        flushed++;
                        console.log('[PendingOps] save_edit_exercise completato:', op.exId);
                    }
                } catch (e) {
                    console.warn('[PendingOps] op fallita, riprovo al prossimo flush:', op.type, e.message);
                }
            }
            return flushed;
        }

        // ── Exercise catalog from imported_exercises (Supabase) ────────────
        let _allExDB = [];
        let _allExDBLoaded = false;
        async function _loadAllExDB() {
            if (_allExDBLoaded) return;
            try {
                const { data, error } = await supabaseClient
                    .from('imported_exercises')
                    .select('*');
                if (error) throw error;
                _allExDB = (data || []).map(e => ({
                    nome_it: e.nome_it,
                    nome_en: e.nome_en || '',
                    categoria: e.categoria,
                    slug: e.slug,
                    immagine_url: e.immagine || '',
                    immagine_url_small: e.immagine_thumbnail || e.immagine || '',
                    video_url: e.video || '',
                    popolarita: e.popolarita || 0
                }));
                _allExDBLoaded = true;
            } catch (e) { console.warn('[Allenamento] exercise DB load failed:', e); }
        }
        function _findEx(name) {
            if (!name) return null;
            return _allExDB.find(e => e.nome_it === name)
                || _allExDB.find(e => e.nome_original === name)
                || null;
        }
        function _findExForCard(ex) {
            if (ex.exercise_slug) {
                const bySlug = _allExDB.find(e => e.slug === ex.exercise_slug);
                if (bySlug) return bySlug;
            }
            return _findEx(ex.exercise_name);
        }

        function showExDetail(slug) {
            const ex = _allExDB.find(e => e.slug === slug);
            if (!ex) return;
            const old = document.getElementById('exDetailOverlay');
            if (old) old.remove();

            const overlay = document.createElement('div');
            overlay.id = 'exDetailOverlay';
            overlay.className = 'schede-ex-detail-overlay';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
            overlay.innerHTML = `
            <div class="schede-ex-detail-panel">
                <div class="schede-ex-detail-header">
                    <div>
                        <h3>${_escHtml(ex.nome_it)}</h3>
                        <span class="schede-ex-detail-cat">${_escHtml(ex.categoria)}</span>
                        <span class="schede-ex-detail-en">${_escHtml(ex.nome_en)}</span>
                    </div>
                    <button class="schede-ex-detail-close" onclick="document.getElementById('exDetailOverlay').remove()">&times;</button>
                </div>
                <div class="schede-ex-detail-body">
                    <div class="schede-ex-detail-media" id="exDetailMedia"></div>
                </div>
            </div>`;
            document.body.appendChild(overlay);

            const mc = document.getElementById('exDetailMedia');
            if (ex.video_url && mc) {
                const v = document.createElement('video');
                v.className = 'schede-ex-detail-video';
                v.controls = true; v.autoplay = true; v.loop = true;
                v.muted = true; v.playsInline = true; v.preload = 'auto';
                v.src = ex.video_url;
                mc.appendChild(v);
                v.load(); v.play().catch(() => {});
            } else if (mc) {
                const img = document.createElement('img');
                img.className = 'schede-ex-detail-img';
                img.src = ex.immagine_url_small; img.alt = ex.nome_it;
                mc.appendChild(img);
            }
            requestAnimationFrame(() => overlay.classList.add('visible'));
        }

        // Chiude il modal edit e ripristina lo scroll del body SOLO se non ci
        // sono altri overlay dettaglio aperti sotto (altrimenti il detail resta
        // aperto ma la pagina tornerebbe scrollabile).
        function closeEditExOverlay() {
            const ov = document.getElementById('editExOverlay');
            if (ov) ov.remove();
            const stillOpen = document.getElementById('exDetailFullOverlay') || document.getElementById('ssDetailFullOverlay');
            if (!stillOpen) document.body.style.overflow = '';
        }

        function showEditExercise(exId) {
            const ex = (_allPlan?.workout_exercises || []).find(e => e.id === exId);
            if (!ex) return;
            const old = document.getElementById('editExOverlay');
            if (old) old.remove();

            const isCardio = (ex.muscle_group || '').toLowerCase() === 'cardio';
            const _dbExEdit = _findExForCard(ex);

            const overlay = document.createElement('div');
            overlay.id = 'editExOverlay';
            overlay.className = 'all-edit-overlay';
            overlay.onclick = (e) => { if (e.target === overlay) closeEditExOverlay(); };

            let setsHtml = '';
            if (!isCardio) {
                setsHtml = `
                <label class="all-edit-label">Serie</label>
                <div class="all-edit-field">
                    <button class="all-edit-stepper" onclick="editExStepper('editExSets', -1)">−</button>
                    <input type="number" id="editExSets" class="all-edit-input" value="${ex.sets || 3}" min="1" inputmode="numeric">
                    <button class="all-edit-stepper" onclick="editExStepper('editExSets', 1)">+</button>
                </div>

                <label class="all-edit-label">Ripetizioni</label>
                <div class="all-edit-field">
                    <input type="text" id="editExReps" class="all-edit-input all-edit-input-wide" value="${_escHtml(ex.reps || '')}" inputmode="text" placeholder="es. 10 o 8-12">
                </div>

                <label class="all-edit-label">Peso (kg)</label>
                <div class="all-edit-field">
                    <input type="number" id="editExWeight" class="all-edit-input all-edit-input-wide" value="${ex.weight_kg ?? ''}" min="0" step="0.5" inputmode="decimal" placeholder="Opzionale">
                </div>

                <label class="all-edit-label">Recupero (secondi)</label>
                <div class="all-edit-field">
                    <input type="number" id="editExRest" class="all-edit-input all-edit-input-wide" value="${ex.rest_seconds ?? ''}" min="0" inputmode="numeric" placeholder="es. 90">
                </div>`;
            } else {
                setsHtml = `
                <label class="all-edit-label">Durata (minuti)</label>
                <div class="all-edit-field">
                    <input type="text" id="editExReps" class="all-edit-input all-edit-input-wide" value="${_escHtml(ex.reps || '')}" inputmode="text" placeholder="es. 20">
                </div>`;
            }

            overlay.innerHTML = `
            <div class="all-edit-panel">
                <div class="all-edit-header">
                    <h3>Modifica esercizio</h3>
                    <button class="all-edit-close" onclick="closeEditExOverlay()">&times;</button>
                </div>
                <div class="all-edit-body">
                    <div class="all-edit-ex-name">${_escHtml(_dbExEdit ? _dbExEdit.nome_it : ex.exercise_name)}</div>
                    ${setsHtml}
                    <label class="all-edit-label">Note</label>
                    <textarea id="editExNotes" class="all-edit-textarea" rows="3" placeholder="Aggiungi note...">${_escHtml(ex.notes || '')}</textarea>
                    <div class="all-edit-actions">
                        <button class="all-edit-save" onclick="saveEditExercise('${exId}', ${isCardio})">Salva modifiche</button>
                        <button class="all-edit-cancel" onclick="closeEditExOverlay()">Annulla</button>
                    </div>
                </div>
            </div>`;
            document.body.appendChild(overlay);
            document.body.style.overflow = 'hidden';
            requestAnimationFrame(() => overlay.classList.add('visible'));
        }

        function editExStepper(inputId, delta) {
            const inp = document.getElementById(inputId);
            if (!inp) return;
            const val = Math.max(1, (parseInt(inp.value) || 0) + delta);
            inp.value = val;
        }

        async function saveEditExercise(exId, isCardio) {
            const btn = document.querySelector('.all-edit-save');
            const saveGen = _bgGeneration; // snapshot generation
            if (btn) { btn.disabled = true; btn.textContent = 'Salvataggio...'; }
            try {
                const updates = {};
                const notes = document.getElementById('editExNotes')?.value.trim() || null;
                updates.notes = notes;

                if (!isCardio) {
                    updates.sets = parseInt(document.getElementById('editExSets')?.value) || 3;
                    updates.reps = document.getElementById('editExReps')?.value.trim() || '10';
                    const w = document.getElementById('editExWeight')?.value;
                    updates.weight_kg = w !== '' && w != null ? parseFloat(w) : null;
                    const r = document.getElementById('editExRest')?.value;
                    updates.rest_seconds = r !== '' && r != null ? parseInt(r) : null;
                } else {
                    updates.reps = document.getElementById('editExReps')?.value.trim() || '10';
                }

                // Salva in coda PRIMA di inviare: se l'app va in background riprende al ritorno
                _enqueueOp({ id: 'ex:' + exId, type: 'save_edit_exercise', exId, updates });
                await WorkoutPlanStorage.updateExercise(exId, updates);
                _dequeueOp('ex:' + exId);

                // Aggiorna anche _allPlan locale (WorkoutPlanStorage._cache è separato)
                const ex = (_allPlan?.workout_exercises || []).find(e => e.id === exId);
                if (ex) Object.assign(ex, updates);

                closeEditExOverlay();
                renderScheda();
                // Se l'utente era dentro un overlay dettaglio, ricarica quello
                // con i dati aggiornati (target, serie, ecc.)
                if (document.getElementById('exDetailFullOverlay')) {
                    openExerciseDetail(exId);
                } else if (document.getElementById('ssDetailFullOverlay') && ex?.superset_group) {
                    openSupersetDetail(ex.superset_group);
                }
            } catch (err) {
                console.error('Errore salvataggio:', err);
                if (saveGen !== _bgGeneration) {
                    // Siamo andati in background durante il save: il flush gestisce.
                    // Chiudi overlay silenziosamente, il refresh dati arriverà dal flush.
                    closeEditExOverlay();
                } else {
                    if (btn) { btn.disabled = false; btn.textContent = 'Salva modifiche'; }
                    alert('Errore nel salvataggio');
                }
            }
        }

        function switchAllView(view) {
            _allView = view;
            const pills = ['pillScheda', 'pillProgressi', 'pillReport', 'pillTablet', 'pillPdf'];
            const views = ['scheda', 'progressi', 'report', 'tablet', 'pdf'];
            pills.forEach((id, i) => {
                const el = document.getElementById(id);
                if (el) {
                    // 'storico' è una sotto-vista di 'progressi' (accessibile dal bottone
                    // dentro Progressi). Quando siamo in storico, teniamo pillProgressi attiva.
                    const isActive = view === views[i] || (view === 'storico' && views[i] === 'progressi');
                    el.classList.toggle('active', isActive);
                    el.setAttribute('aria-selected', isActive);
                }
            });
            // Hide/show FAB only for scheda view
            const fab = document.getElementById('allFabCreate');
            if (fab) fab.style.display = view === 'scheda' ? '' : 'none';
            if (view === 'scheda') renderScheda();
            else if (view === 'storico') renderStorico();
            else if (view === 'progressi') renderProgressi();
            else if (view === 'report') renderReport();
            else if (view === 'tablet') renderTabletQR();
            else if (view === 'pdf') renderPdfDownload();
        }

        // ── Init ──────────────────────────────────────────────────────────
        // _initAllenamento(): full init (auth + admin check + data) — usato al
        // primo caricamento e su bfcache restore (pageshow persisted).
        // _refreshAllenamentoData(): solo refetch dati + render — usato sul
        // resume da background. NON chiama initAuth perché:
        //  1) initAuth attende INITIAL_SESSION che su un client già esistente
        //     non viene mai più emesso → 6s di timeout fallback inutile
        //  2) Su iOS PWA può inchiodarsi sul lock auth di Supabase
        //  Il refresh sessione lo gestisce auth.js con il suo visibilitychange.
        async function _refreshAllenamentoData({ isInitial = false } = {}) {
            const user = getCurrentUser();
            if (!user) return;
            try {
                await _loadAllExDB();
                // Tenta di completare operazioni pendenti prima del fetch dati,
                // così il DB è allineato prima che carichiamo i piani freschi
                await flushPendingWorkoutOps();

                // Fetch plans + next booking in parallel (timeout 15s ciascuna)
                const today = _localDateStr();
                const [plansRes, bookingRes] = await Promise.all([
                    _queryWithTimeout(supabaseClient
                        .from('workout_plans')
                        .select('*, workout_exercises(*)')
                        .eq('user_id', user.id)
                        .order('active', { ascending: false })
                        .order('updated_at', { ascending: false }), 15000),
                    _queryWithTimeout(supabaseClient
                        .from('bookings')
                        .select('date, time, slot_type')
                        .eq('user_id', user.id)
                        .eq('status', 'confirmed')
                        .gte('date', today)
                        .order('date', { ascending: true })
                        .order('time', { ascending: true })
                        .limit(20), 15000)
                ]);

                const { data: plans, error } = plansRes;
                _nextBookings = bookingRes.data || [];
                if (error) throw error;
                if (!plans?.length) {
                    document.getElementById('allContent').innerHTML =
                        '<div class="all-empty">Nessuna scheda ancora.<br>Premi il <strong>+</strong> in basso per crearne una!</div>';
                    return;
                }

                // Sort exercises within each plan
                for (const p of plans) {
                    p.workout_exercises = (p.workout_exercises || []).sort((a, b) => a.sort_order - b.sort_order);
                }

                _allPlans = plans;
                // Mantieni la scheda corrente se esiste ancora dopo un re-init,
                // altrimenti fallback su quella attiva o la prima
                const _previousPlanId = _allPlan?.id;
                _allPlan = (_previousPlanId && plans.find(p => p.id === _previousPlanId))
                    || plans.find(p => p.active)
                    || plans[0];

                // Build plan selector if multiple plans
                _renderPlanSelector();

                // Fetch logs for current plan
                await _loadLogsForPlan(_allPlan);

                // Re-renderizza la view correntemente attiva (non sempre 'scheda':
                // dopo un resume da background l'utente potrebbe essere su Progressi/Tablet/PDF)
                if (_allView === 'progressi') renderProgressi();
                else if (_allView === 'storico') renderStorico();
                else if (_allView === 'tablet') renderTabletQR();
                else if (_allView === 'pdf') renderPdfDownload();
                else renderScheda();
                _allLastRefreshTs = Date.now();
            } catch (e) {
                console.warn('[Allenamento] data refresh failed:', e);
                // Su init mostra l'errore. Su resume tieni l'UI esistente
                // (l'utente vede ancora i suoi dati cached, prossimo refresh riproverà).
                if (isInitial) {
                    document.getElementById('allContent').innerHTML = '<div class="all-empty">Errore caricamento scheda.</div>';
                }
            }
        }

        async function _initAllenamento() {
            await initAuth();
            const user = getCurrentUser();

            // Redirect utenti non loggati
            if (!user) {
                window.location.replace('/');
                return;
            }

            const _isAdmin = sessionStorage.getItem('adminAuth') === 'true';

            // Utenti non admin: verifica che abbiano almeno una scheda attiva
            if (!_isAdmin) {
                const { count } = await _queryWithTimeout(supabaseClient.from('workout_plans')
                    .select('id', { count: 'exact', head: true })
                    .eq('user_id', user.id).eq('active', true), 15000);
                if (!count) {
                    window.location.replace('/');
                    return;
                }
            }

            // Mostra FAB per creare scheda
            const fab = document.getElementById('allFabCreate');
            if (fab) fab.style.display = '';

            await _refreshAllenamentoData({ isInitial: true });
        }
        _initAllenamento();

        // ── PWA lifecycle: resume da background ───────────────────────────
        // Quando la PWA torna in foreground dopo essere stata in background,
        // il runtime JS può essere stato congelato e il lock auth di Supabase
        // può rimanere bloccato — risultato: i pulsanti smettono di rispondere.
        // Qui ricarichiamo i dati e ri-renderizziamo, MA solo se l'utente non
        // sta attivamente lavorando (modal aperto o input con focus), per non
        // perdere ciò che stava facendo.
        let _allLastHidden = 0;
        function _allHasOpenOverlay() {
            if (document.getElementById('editExOverlay')) return true;
            if (document.getElementById('exDetailOverlay')) return true;
            if (document.getElementById('exDetailFullOverlay')) return true;
            if (document.getElementById('ssDetailFullOverlay')) return true;
            if (document.getElementById('storicoEditOverlay')) return true;
            if (document.getElementById('allFabSheetOverlay')) return true;
            const cpm = document.getElementById('createPlanModal');
            if (cpm && cpm.style.display && cpm.style.display !== 'none') return true;
            return false;
        }
        function _allHasFocusedInput() {
            const ae = document.activeElement;
            if (!ae) return false;
            if (ae.tagName !== 'INPUT' && ae.tagName !== 'TEXTAREA') return false;
            return !!ae.closest('#allContent');
        }
        let _hadSaveInFlightOnHide = false;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                _allLastHidden = Date.now();
                _bgGeneration++;
                // Rileva se c'era un save in corso al momento del background
                _hadSaveInFlightOnHide =
                    !!document.querySelector('.all-log-save[disabled]') ||
                    !!document.querySelector('.all-edit-save[disabled]') ||
                    _getOpsQueue().length > 0;
                return;
            }
            const bgSec = _allLastHidden ? (Date.now() - _allLastHidden) / 1000 : 0;
            if (bgSec < 1) return; // ignora micro-switch assoluti (<1s)
            // Se c'era un save in corso oppure background >= 2s: reload completo.
            // La coda in localStorage sopravvive al reload; il flush parte in
            // _initAllenamento → _refreshAllenamentoData → flushPendingWorkoutOps.
            if (_hadSaveInFlightOnHide || bgSec >= 2) {
                window.location.reload();
            }
        });
        // bfcache restore (back/forward cache): la pagina viene ripristinata
        // dalla memoria senza ri-eseguire gli script — serve il pageshow per accorgersene.
        // Qui sì initAuth completo: il bfcache potrebbe avere restituito uno stato
        // dove anche auth.js è "addormentato" e va risvegliato esplicitamente.
        window.addEventListener('pageshow', (e) => {
            if (!e.persisted) return;
            if (_allHasOpenOverlay() || _allHasFocusedInput()) return;
            _initAllenamento();
        });
        // Connessione ripristinata: flush immediato + re-render per allineare la UI
        window.addEventListener('online', async () => {
            const user = getCurrentUser();
            if (user) {
                await flushPendingWorkoutOps();
                _refreshAllenamentoData();
            }
        });

        // ── Heartbeat: sessione + refresh dati mentre la pagina resta aperta ──
        // Ogni 90s controlla che la sessione Supabase sia valida.
        // Se non valida → reload. Se valida ma dati fermi da >5min → refresh.
        setInterval(async () => {
            if (document.hidden) return;
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                if (error || !session) {
                    console.warn('[Heartbeat] sessione assente, provo refresh...');
                    const { error: refreshErr } = await supabaseClient.auth.refreshSession();
                    if (refreshErr) {
                        console.warn('[Heartbeat] refreshSession fallita, ricarico:', refreshErr.message);
                        window.location.reload();
                    }
                    return;
                }
                if (Date.now() - _allLastRefreshTs > 5 * 60 * 1000) {
                    _refreshAllenamentoData();
                }
            } catch (e) {
                console.warn('[Heartbeat] getSession fallita:', e.message);
            }
        }, 90000);

        // ── Watchdog UI: sblocca bottoni rimasti su Salvataggio... oltre 20s ──
        // Con _queryWithTimeout(15s) un save legittimo non può durare >15s.
        // Se dopo 20s il bottone è ancora bloccato, la promise è congelata:
        // sblocca la UI e riallinea i dati con un refresh.
        setInterval(() => {
            if (document.hidden) return;
            let stuck = false;
            document.querySelectorAll('.all-log-save').forEach(btn => {
                if (btn.disabled && btn.textContent === 'Salvataggio...') {
                    console.warn('[Watchdog] bottone log bloccato, sblocco');
                    btn.textContent = 'Salva';
                    btn.disabled = false;
                    btn.classList.remove('all-log-save--done');
                    stuck = true;
                }
            });
            const editBtn = document.querySelector('.all-edit-save');
            if (editBtn && editBtn.disabled && editBtn.textContent === 'Salvataggio...') {
                console.warn('[Watchdog] bottone edit bloccato, sblocco');
                editBtn.disabled = false;
                editBtn.textContent = 'Salva modifiche';
                stuck = true;
            }
            if (stuck) _refreshAllenamentoData();
        }, 20000);

        // ── Plan selector ─────────────────────────────────────────────────
        function _renderPlanSelector() {
            if (!_allPlan) return;
            const nav = document.querySelector('.all-nav');
            if (!nav) return;
            const existing = document.getElementById('allPlanSelector');
            if (existing) existing.remove();
            const sel = document.createElement('div');
            sel.id = 'allPlanSelector';
            sel.className = 'all-plan-selector';
            const hasMany = _allPlans.length > 1;
            const picker = hasMany
                ? `<select class="all-plan-select" onchange="switchPlan(this.value)">
                    ${_allPlans.map(p => {
                        const label = _escHtml(p.name) + (p.active ? ' (attiva)' : '');
                        return `<option value="${p.id}" ${p.id === _allPlan.id ? 'selected' : ''}>${label}</option>`;
                    }).join('')}
                </select>`
                : `<span class="all-plan-single">${_escHtml(_allPlan.name)}</span>`;
            sel.innerHTML = `${picker}<button class="all-plan-rename-btn" onclick="renamePlan()" title="Rinomina scheda" aria-label="Rinomina scheda">&#9998;</button>`;
            nav.parentNode.insertBefore(sel, nav);
        }

        async function renamePlan() {
            if (!_allPlan) return;
            const current = _allPlan.name || '';
            const next = prompt('Nuovo nome scheda:', current);
            if (next == null) return;
            const trimmed = next.trim();
            if (!trimmed || trimmed === current) return;
            try {
                await WorkoutPlanStorage.updatePlan(_allPlan.id, { name: trimmed });
                _allPlan.name = trimmed;
                const idx = _allPlans.findIndex(p => p.id === _allPlan.id);
                if (idx >= 0) _allPlans[idx].name = trimmed;
                _renderPlanSelector();
                if (typeof showToast === 'function') showToast('Scheda rinominata', 'success');
            } catch (e) {
                console.error('[Allenamento] rename plan error:', e);
                if (typeof showToast === 'function') showToast('Errore rinomina: ' + (e.message || ''), 'error');
            }
        }

        async function switchPlan(planId) {
            const plan = _allPlans.find(p => p.id === planId);
            if (!plan) return;
            _allPlan = plan;
            document.getElementById('allContent').innerHTML = '<div class="all-loading">Caricamento...</div>';
            await _loadLogsForPlan(plan);
            if (_allView === 'scheda') renderScheda();
            else if (_allView === 'storico') renderStorico();
            else renderProgressi();
        }

        async function _loadLogsForPlan(plan) {
            const user = getCurrentUser();
            if (!user) return;
            const exIds = (plan.workout_exercises || []).map(e => e.id);
            if (exIds.length) {
                const { data: logsData } = await supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .in('exercise_id', exIds)
                    .eq('user_id', user.id)
                    .order('log_date', { ascending: false })
                    .order('set_number', { ascending: true });
                _allLogs = logsData || [];
            } else {
                _allLogs = [];
            }
        }

        // ── Helpers: last-done per day, previous session per exercise ──
        function _dayLastDone(dayLabel) {
            // Trova la data più recente in cui è stato loggato qualcosa per un esercizio di questo giorno
            const dayExIds = new Set(
                (_allPlan?.workout_exercises || []).filter(e => e.day_label === dayLabel).map(e => e.id)
            );
            let latest = null;
            for (const l of _allLogs) {
                if (dayExIds.has(l.exercise_id) && (!latest || l.log_date > latest)) latest = l.log_date;
            }
            return latest;
        }

        function _dayDoneToday(dayLabel) {
            const today = _localDateStr();
            const exIds = (_allPlan?.workout_exercises || []).filter(e => e.day_label === dayLabel).map(e => e.id);
            if (!exIds.length) return false;
            return exIds.every(id => _allLogs.some(l => l.exercise_id === id && l.log_date === today));
        }

        function _prevSessionLogs(exerciseId) {
            // Restituisce i log della sessione precedente (non oggi) per questo esercizio
            const today = _localDateStr();
            const prevLogs = _allLogs.filter(l => l.exercise_id === exerciseId && l.log_date < today);
            if (!prevLogs.length) return [];
            // Prendi la data più recente
            const latestDate = prevLogs.reduce((max, l) => l.log_date > max ? l.log_date : max, prevLogs[0].log_date);
            return prevLogs.filter(l => l.log_date === latestDate).sort((a, b) => a.set_number - b.set_number);
        }

        function _suggestDay(days) {
            // Priorità: se un giorno è stato loggato oggi, resta su quello fino a fine giornata
            // (altrimenti rotazione "più recente fra i fatti" lo scarterebbe a favore degli altri)
            const today = _localDateStr();
            for (const day of days) {
                if (_dayLastDone(day) === today) return day;
            }
            // Altrimenti: giorno fatto più tempo fa, o mai fatto
            let best = null;
            let bestDate = 'zzzz'; // sempre dopo qualsiasi data
            for (const day of days) {
                const last = _dayLastDone(day);
                if (!last) return day; // mai fatto → suggerisci subito
                if (last < bestDate) { bestDate = last; best = day; }
            }
            return best || days[0];
        }

        function switchDay(dayLabel) {
            _activeDay = dayLabel;
            renderScheda();
        }

        // ── Render Scheda ─────────────────────────────────────────────────
        function renderScheda() {
            const container = document.getElementById('allContent');
            if (!_allPlan) return;

            const exercises = _allPlan.workout_exercises;
            const today = _localDateStr();
            const todayLogs = _allLogs.filter(l => l.log_date === today);

            // Ordina giorni per sort_order minimo degli esercizi
            const dayMinOrder = {};
            for (const e of exercises) {
                if (!(e.day_label in dayMinOrder) || e.sort_order < dayMinOrder[e.day_label])
                    dayMinOrder[e.day_label] = e.sort_order;
            }
            const days = [...new Set(exercises.map(e => e.day_label))].sort((a, b) => dayMinOrder[a] - dayMinOrder[b]);

            // Auto-select day
            if (!_activeDay || !days.includes(_activeDay)) _activeDay = _suggestDay(days);

            let html = '';

            // ── Map next bookings to days (rotation by least-recent) ────
            const dayNextMap = {};
            if (_nextBookings.length) {
                const tom = new Date(); tom.setDate(tom.getDate() + 1);
                const tomStr = tom.toISOString().slice(0, 10);
                // Se un giorno è già stato loggato oggi, "consuma" la prenotazione di oggi:
                // la salto dalla mappa (non finisce sugli altri tab) e quel giorno va in fondo
                // alla rotazione (le prossime prenotazioni vanno ai giorni non ancora fatti).
                const dayLoggedToday = days.find(d => _dayLastDone(d) === today);
                const upcomingBookings = dayLoggedToday
                    ? _nextBookings.filter(b => b.date !== today)
                    : _nextBookings;
                const rotation = [...days].sort((a, b) => {
                    if (a === dayLoggedToday && b !== dayLoggedToday) return 1;
                    if (b === dayLoggedToday && a !== dayLoggedToday) return -1;
                    const la = _dayLastDone(a), lb = _dayLastDone(b);
                    if (!la && !lb) return 0;
                    if (!la) return -1;
                    if (!lb) return 1;
                    return la < lb ? -1 : la > lb ? 1 : 0;
                });
                for (let i = 0; i < Math.min(upcomingBookings.length, rotation.length); i++) {
                    const nb = upcomingBookings[i].date;
                    dayNextMap[rotation[i]] = nb === today ? 'oggi' : nb === tomStr ? 'domani' : _fmtDateAll(nb);
                }
            }

            // ── Day selector tabs ────────────────────────────────────────
            html += '<div class="all-day-tabs" role="tablist" aria-label="Giorni di allenamento">';
            for (const day of days) {
                const isActive = day === _activeDay;
                const doneToday = _dayDoneToday(day);
                const lastDone = _dayLastDone(day);
                const lastStr = doneToday ? 'oggi' : lastDone ? _fmtDateAll(lastDone) : 'mai';
                const nextStr = dayNextMap[day] || '';

                html += `<button class="all-day-tab ${isActive ? 'active' : ''} ${doneToday ? 'done' : ''}" role="tab" aria-selected="${isActive}" aria-label="${_escHtml(day)}${doneToday ? ', completato' : ''}" data-day="${_escHtml(day)}" onclick="switchDay('${_escHtml(day)}')">
                    <span class="all-day-tab-name">${_escHtml(day)}${doneToday ? ' &#10003;' : ''}</span>
                    <span class="all-day-tab-last">ultimo: ${lastStr}</span>
                    <span class="all-day-tab-next">prossimo: ${nextStr || 'niente'}</span>
                </button>`;
            }
            // Tasto + per aggiungere giorno
            html += `<button class="all-day-tab all-day-tab-add" role="tab" aria-label="Aggiungi giorno" onclick="addDayToScheda()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>`;
            html += '</div>';

            // ── Exercises for selected day only ──────────────────────────
            const dayExercises = exercises.filter(e => e.day_label === _activeDay).sort((a, b) => a.sort_order - b.sort_order);
            const dayDoneCount = dayExercises.filter(ex => todayLogs.some(l => l.exercise_id === ex.id)).length;

            html += `<div class="all-day">
                <div class="all-day-header">
                    <span class="all-day-label">${_escHtml(_activeDay)}</span>
                    <span class="all-day-count">${dayDoneCount}/${dayExercises.length} completati</span>
                </div>`;

            // Build superset groups map
            const _ssRendered = new Set();
            const _ssGroupMap = {};
            for (const ex of dayExercises) {
                if (ex.superset_group) {
                    if (!_ssGroupMap[ex.superset_group]) _ssGroupMap[ex.superset_group] = [];
                    _ssGroupMap[ex.superset_group].push(ex);
                }
            }

            for (const ex of dayExercises) {
                // ── Superset card ────────────────────────────────────────
                if (ex.superset_group && !_ssRendered.has(ex.superset_group)) {
                    _ssRendered.add(ex.superset_group);
                    const pair = _ssGroupMap[ex.superset_group] || [ex];
                    const ex1 = pair[0], ex2 = pair[1];
                    const allDone = pair.every(e => todayLogs.some(l => l.exercise_id === e.id));
                    const db1 = _findExForCard(ex1), db2 = ex2 ? _findExForCard(ex2) : null;
                    const thumb1 = db1 ? db1.immagine_url_small : '', thumb2 = db2 ? db2.immagine_url_small : '';
                    const slug1 = db1 ? db1.slug : '', slug2 = db2 ? db2.slug : '';
                    const ssId = ex.superset_group;
                    const t1 = `${ex1.sets}\u00d7${ex1.reps}${ex1.weight_kg != null ? ' @' + ex1.weight_kg + 'kg' : ''}`;
                    const t2 = ex2 ? `${ex2.sets}\u00d7${ex2.reps}${ex2.weight_kg != null ? ' @' + ex2.weight_kg + 'kg' : ''}` : '';
                    const restDisp = ex2 && ex2.rest_seconds ? `${ex2.rest_seconds}s pausa` : '';

                    html += `<div class="all-ss-card ${allDone ? 'all-ss-done' : ''}" id="ss-${ssId}" data-ss-id="${ssId}" data-sort="${ex1.sort_order}">
                        <div class="all-ex-delete-action" onclick="deleteSupersetFromPlan('${ssId}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            <span>Elimina</span>
                        </div>
                        <div class="all-ex-swipe-content">
                        <div class="all-ss-header" onclick="openSupersetDetail('${ssId}')">
                            <div class="all-ss-thumbs">
                                <span class="all-ss-badge">SS</span>
                                ${thumb1 ? `<img src="${thumb1}" class="all-ss-thumb" alt="" loading="lazy">` : ''}
                                ${thumb2 ? `<img src="${thumb2}" class="all-ss-thumb" alt="" loading="lazy">` : ''}
                            </div>
                            <div class="all-ss-info">
                                <div class="all-ss-names">
                                    <span class="all-ss-ex-name">${_escHtml(db1 ? db1.nome_it : ex1.exercise_name)}</span>
                                    ${ex2 ? `<span class="all-ss-ex-name">${_escHtml(db2 ? db2.nome_it : ex2.exercise_name)}</span>` : ''}
                                </div>
                                <div class="all-ss-target">${t1} + ${t2}${restDisp ? ' \u00b7 ' + restDisp : ''}</div>
                            </div>
                            <div class="all-ss-status">${allDone ? '<span class="all-ex-check">&#10003;</span>' : '<span class="all-ss-chevron">&#8250;</span>'}</div>
                        </div>
                        </div>
                    </div>`;
                    continue;
                }
                if (ex.superset_group && _ssRendered.has(ex.superset_group)) continue;

                // ── Normal single exercise card ─────────────────────────
                const _cardio = (ex.muscle_group || '').toLowerCase() === 'cardio';
                const target = _cardio
                    ? `${ex.reps} min`
                    : `${ex.sets} \u00d7 ${ex.reps}${ex.weight_kg != null ? ' @ ' + ex.weight_kg + ' kg' : ''}${ex.rest_seconds ? ' \u00b7 ' + (ex.rest_seconds <= 3 ? ex.rest_seconds + ' min' : ex.rest_seconds + 's') + ' pausa' : ''}`;
                const hasLogs = todayLogs.some(l => l.exercise_id === ex.id);
                const prevLogs = _prevSessionLogs(ex.id);
                const dbEx = _findExForCard(ex);
                const thumbSrc = dbEx ? dbEx.immagine_url_small : '';
                const exSlug = dbEx ? dbEx.slug : '';

                html += `<div class="all-ex-card ${hasLogs ? 'all-ex-done' : ''}" id="ex-${ex.id}" data-ex-id="${ex.id}" data-sort="${ex.sort_order}" data-ex-slug="${_escHtml(exSlug)}">
                    <div class="all-ex-delete-action" onclick="deleteExerciseFromPlan('${ex.id}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        <span>Elimina</span>
                    </div>
                    <div class="all-ex-swipe-content">
                    <div class="all-ex-header" onclick="openExerciseDetail('${ex.id}')">
                        ${thumbSrc ? `<img src="${thumbSrc}" class="all-ex-thumb" alt="" loading="lazy">` : ''}
                        <div class="all-ex-info">
                            <div class="all-ex-name">${_escHtml(dbEx ? dbEx.nome_it : ex.exercise_name)}<button class="all-ex-edit-btn" onclick="event.stopPropagation();showEditExercise('${ex.id}')" title="Modifica esercizio">&#9998;</button></div>
                            <div class="all-ex-target">${target}</div>
                        </div>
                        <div class="all-ex-status">${hasLogs ? '<span class="all-ex-check">&#10003;</span>' : '<span class="all-ex-chevron">&#8250;</span>'}</div>
                    </div>
                    </div>
                </div>`;
            }
            html += '</div>';

            container.innerHTML = html;
            _initSwipeAndDrag();
            _initDayTabLongPress();
            // Centra il tab attivo solo orizzontalmente dentro la barra: mai
            // scrollIntoView, che muoverebbe anche la finestra riportandola in
            // cima quando si aggiunge un esercizio con la pagina scrollata.
            const tabsEl = container.querySelector('.all-day-tabs');
            const activeTab = tabsEl ? tabsEl.querySelector('.all-day-tab.active') : null;
            if (tabsEl && activeTab) {
                const target = activeTab.offsetLeft - (tabsEl.clientWidth - activeTab.offsetWidth) / 2;
                tabsEl.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
            }
        }

        // ── Helper: log section HTML (inputs Serie/Reps/Kg/Riposo) ──
        function _buildLogSectionHtml(ex, todayLogs, prevLogs) {
            const isCardio = (ex.muscle_group || '').toLowerCase() === 'cardio';
            const today = _localDateStr();
            const restVal = ex.rest_seconds ?? '';

            let html = `<div class="all-log-section" data-ex-id="${ex.id}">
                <div class="all-log-header">Registra per oggi — ${_fmtDateAll(today)}</div>
                <div class="all-log-grid${isCardio ? ' all-log-grid-cardio' : ''}">
                    <div class="all-log-grid-header">
                        ${isCardio ? '<span>Min</span>' : '<span>Serie</span><span>Ripetizioni</span><span>Kg</span><span>Riposo</span>'}
                    </div>`;

            if (isCardio) {
                const existing = todayLogs.find(l => l.exercise_id === ex.id && l.set_number === 1);
                const prev = prevLogs.find(l => l.set_number === 1);
                const mVal = existing?.reps_done ?? prev?.reps_done ?? (parseInt(ex.reps) || '');
                html += `<div class="all-log-row all-log-row-cardio">
                    <input type="number" inputmode="numeric" min="0" value="${mVal}" class="all-log-input" data-field="reps" data-set="1" aria-label="Minuti">
                </div>`;
            } else {
                const todayMax = todayLogs.filter(l => l.exercise_id === ex.id).reduce((m, l) => Math.max(m, l.set_number), 0);
                const totalRows = Math.max(ex.sets, todayMax);
                for (let s = 1; s <= totalRows; s++) {
                    const existing = todayLogs.find(l => l.exercise_id === ex.id && l.set_number === s);
                    const prev = prevLogs.find(l => l.set_number === s);
                    const isExtra = s > ex.sets;
                    const rVal = existing?.reps_done ?? prev?.reps_done ?? (isExtra ? '' : (parseInt(ex.reps) || ''));
                    const wVal = existing?.weight_done ?? prev?.weight_done ?? (isExtra ? '' : (ex.weight_kg ?? ''));
                    const rstVal = existing?.rest_done ?? prev?.rest_done ?? (isExtra ? '' : restVal);
                    html += `<div class="all-log-row">
                        <span class="all-log-set">${s}</span>
                        <input type="number" inputmode="numeric" min="0" value="${rVal}" class="all-log-input" data-field="reps" data-set="${s}" aria-label="Ripetizioni serie ${s}">
                        <input type="number" inputmode="decimal" min="0" step="0.5" value="${wVal}" class="all-log-input" data-field="weight" data-set="${s}" aria-label="Peso serie ${s}">
                        <input type="number" inputmode="numeric" min="0" value="${rstVal}" class="all-log-input" data-field="rest" data-set="${s}" aria-label="Riposo serie ${s}">
                    </div>`;
                }
            }

            const hasLogs = todayLogs.some(l => l.exercise_id === ex.id);
            html += `</div>
                ${isCardio ? '' : `<button class="all-log-add-set" onclick="addExtraSet('${ex.id}', this)">+ Serie</button>`}
                <div class="all-log-actions">
                    <button class="all-log-save" onclick="saveLog('${ex.id}', this)">Salva</button>
                    ${hasLogs ? `<button class="all-log-delete" onclick="deleteTodayLog('${ex.id}', this)">Elimina log di oggi</button>` : ''}
                </div>
            </div>`;
            return html;
        }

        function _buildPrevSessionHtml(ex, prevLogs) {
            if (!prevLogs.length) return '';
            const isCardio = (ex.muscle_group || '').toLowerCase() === 'cardio';
            const prevDate = prevLogs[0].log_date;
            let html = `<div class="all-prev-session">
                <span class="all-prev-label">Sessione precedente — ${_fmtDateAll(prevDate)}</span>
                <div class="all-prev-sets">`;
            for (const pl of prevLogs) {
                html += isCardio
                    ? `<span class="all-prev-set">${pl.reps_done || '—'} min</span>`
                    : `<span class="all-prev-set">${pl.set_number}. ${pl.reps_done || '—'}×${pl.weight_done != null ? pl.weight_done + 'kg' : '—'}</span>`;
            }
            html += `</div></div>`;
            return html;
        }

        function _buildDetailMediaHtml(dbEx) {
            if (!dbEx) return '<div class="all-detail-media-placeholder"></div>';
            if (dbEx.video_url) {
                return `<video class="all-detail-media-video" src="${_escHtml(dbEx.video_url)}" autoplay loop muted playsinline preload="auto" controls></video>`;

            if (dbEx.immagine_url_small) {
                return `<img class="all-detail-media-img" src="${_escHtml(dbEx.immagine_url_small)}" alt="${_escHtml(dbEx.nome_it || '')}">`;
            }
            return '<div class="all-detail-media-placeholder"></div>';
        }
