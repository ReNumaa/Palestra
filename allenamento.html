        async function saveLog(exerciseId, btn) {
            const user = getCurrentUser();
            if (!user) return;
            const section = btn.closest('.all-log-section');
            const rows = section.querySelectorAll('.all-log-row');
            const today = _localDateStr();
            const saveGen = _bgGeneration; // snapshot: se cambia → siamo andati in background
            btn.disabled = true;
            btn.textContent = 'Salvataggio...';
            try {
                // Raccoglie i set in anticipo per poterli mettere in coda prima di inviare
                const setsPayload = Array.from(rows).map(row => {
                    const setEl = row.querySelector('.all-log-set');
                    const reps = row.querySelector('input[data-field="reps"]');
                    const weight = row.querySelector('input[data-field="weight"]');
                    const rest = row.querySelector('input[data-field="rest"]');
                    return {
                        setNumber: setEl ? parseInt(setEl.textContent) : 1,
                        repsDone:   reps?.value   ? parseInt(reps.value)     : null,
                        weightDone: weight?.value ? parseFloat(weight.value) : null,
                        restDone:   rest?.value   ? parseInt(rest.value)     : null,
                        rpe: null,
                    };
                });
                // Salva in coda PRIMA di inviare: se l'app va in background riprende al ritorno
                const opId = exerciseId + ':' + today;
                _enqueueOp({ id: opId, type: 'save_log', exerciseId, userId: user.id, logDate: today, sets: setsPayload });
                for (const s of setsPayload) {
                    await WorkoutLogStorage.logSet({
                        exercise_id: exerciseId,
                        user_id: user.id,
                        log_date: today,
                        set_number: s.setNumber,
                        reps_done: s.repsDone,
                        weight_done: s.weightDone,
                        rest_done: s.restDone,
                        rpe: s.rpe,
                    });
                }
                _dequeueOp(opId);
                // Update local logs from cache (WorkoutLogStorage.logSet() l'ha già aggiornata)
                const cachedLogs = WorkoutLogStorage.getByExercise(exerciseId).filter(l => l.log_date === today);
                _allLogs = _allLogs.filter(l => !(l.exercise_id === exerciseId && l.log_date === today));
                _allLogs.push(...cachedLogs);
                // Update UI: checkmark + done state sulla card in lista
                const card = document.getElementById('ex-' + exerciseId);
                if (card) {
                    card.classList.add('all-ex-done');
                    const statusEl = card.querySelector('.all-ex-status');
                    if (statusEl) statusEl.innerHTML = '<span class="all-ex-check">&#10003;</span>';
                }
                // Mostra "Elimina log di oggi" in tutte le log-section visibili (overlay inclusi)
                const logSections = document.querySelectorAll(`.all-log-section[data-ex-id="${exerciseId}"]`);
                logSections.forEach(sec => {
                    const actions = sec.querySelector('.all-log-actions');
                    if (actions && !actions.querySelector('.all-log-delete')) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'all-log-delete';
                        delBtn.textContent = 'Elimina log di oggi';
                        delBtn.onclick = function() { deleteTodayLog(exerciseId, delBtn); };
                        actions.appendChild(delBtn);
                    }
                });
                // Update superset card if this exercise belongs to one
                const dayExercises = (_allPlan?.workout_exercises || []).filter(e => e.day_label === _activeDay);
                const todayLogs = _allLogs.filter(l => l.log_date === today);
                const thisEx = dayExercises.find(e => e.id === exerciseId);
                if (thisEx && thisEx.superset_group) {
                    const ssCard = document.getElementById('ss-' + thisEx.superset_group);
                    if (ssCard) {
                        const pair = dayExercises.filter(e => e.superset_group === thisEx.superset_group);
                        const allSsDone = pair.every(e => todayLogs.some(l => l.exercise_id === e.id));
                        if (allSsDone) {
                            ssCard.classList.add('all-ss-done');
                            const ssStatus = ssCard.querySelector('.all-ss-status');
                            if (ssStatus) ssStatus.innerHTML = '<span class="all-ex-check">&#10003;</span>';
                        }
                    }
                }
                // Update day done count
                const doneCount = dayExercises.filter(ex => todayLogs.some(l => l.exercise_id === ex.id)).length;
                const countEl = document.querySelector('.all-day-count');
                if (countEl) countEl.textContent = `${doneCount}/${dayExercises.length} completati`;
                // Update day tab
                const dayTabs = document.querySelectorAll('.all-day-tab');
                dayTabs.forEach(tab => {
                    if (tab.querySelector('.all-day-tab-name')?.textContent.replace(' ✓', '').trim() === _activeDay) {
                        if (!tab.classList.contains('done')) {
                            tab.classList.add('done');
                            const nameEl = tab.querySelector('.all-day-tab-name');
                            if (nameEl && !nameEl.textContent.includes('✓')) nameEl.innerHTML += ' &#10003;';
                            const lastEl = tab.querySelector('.all-day-tab-last');
                            if (lastEl) lastEl.textContent = 'ultimo: oggi';
                        }
                    }
                });

                if (typeof showToast === 'function') showToast('Log salvato', 'success');
                btn.textContent = 'Salvato!';
                btn.classList.add('all-log-save--done');
                setTimeout(() => { btn.textContent = 'Salva'; btn.disabled = false; btn.classList.remove('all-log-save--done'); }, 2000);
            } catch (e) {
                console.error('[Allenamento] log error:', e);
                if (saveGen !== _bgGeneration) {
                    // Siamo andati in background durante il save: il flush gestisce.
                    // Non mostrare falso errore, sblocca solo il bottone silenziosamente.
                    btn.textContent = 'Salva';
                    btn.disabled = false;
                } else {
                    btn.textContent = 'Salva';
                    btn.disabled = false;
                    if (typeof showToast === 'function') showToast('Errore salvataggio', 'error');
                }
            }
        }

        function addExtraSet(exerciseId, btn) {
            const section = btn.closest('.all-log-section');
            const grid = section.querySelector('.all-log-grid');
            const rows = grid.querySelectorAll('.all-log-row');
            const nextSet = rows.length + 1;
            const row = document.createElement('div');
            row.className = 'all-log-row';
            row.innerHTML = `
                <span class="all-log-set">${nextSet}</span>
                <input type="number" inputmode="numeric" min="0" value="" class="all-log-input" data-field="reps" data-set="${nextSet}" aria-label="Ripetizioni serie ${nextSet}">
                <input type="number" inputmode="decimal" min="0" step="0.5" value="" class="all-log-input" data-field="weight" data-set="${nextSet}" aria-label="Peso serie ${nextSet}">
                <input type="number" inputmode="numeric" min="0" value="" class="all-log-input" data-field="rest" data-set="${nextSet}" aria-label="Riposo serie ${nextSet}">
            `;
            grid.appendChild(row);
            row.querySelector('input[data-field="reps"]').focus();
        }

        async function deleteTodayLog(exerciseId, btn) {
            if (!confirm('Eliminare il log di oggi per questo esercizio?')) return;
            const user = getCurrentUser();
            if (!user) return;
            const today = _localDateStr();
            btn.disabled = true;
            btn.textContent = 'Eliminazione...';
            try {
                const todayForEx = _allLogs.filter(l => l.exercise_id === exerciseId && l.log_date === today);
                for (const log of todayForEx) {
                    await WorkoutLogStorage.deleteLog(log.id);
                }
                _allLogs = _allLogs.filter(l => !(l.exercise_id === exerciseId && l.log_date === today));
                if (typeof showToast === 'function') showToast('Log eliminato', 'success');
                // Se sono in un overlay dettaglio, chiudilo per tornare alla scheda
                closeExerciseDetail();
                closeSupersetDetail();
                renderScheda();
            } catch (e) {
                console.error('[Allenamento] delete error:', e);
                btn.disabled = false;
                btn.textContent = 'Elimina log di oggi';
                if (typeof showToast === 'function') showToast('Errore eliminazione', 'error');
            }
        }

        // ── Render Storico ────────────────────────────────────────────────
        // Raggruppa log per NOME esercizio. Espandibile per vedere/modificare
        // i log per data. Permette di modificare singoli set o eliminare
        // intere giornate.
        let _storicoExpanded = new Set();
        let _storicoSearch = '';

        async function renderStorico() {
            const container = document.getElementById('allContent');
            const user = getCurrentUser();
            if (!user) return;

            container.innerHTML = '<div class="all-loading">Caricamento storico...</div>';

            try {
                // Raccogli tutti gli esercizi da tutti i piani dell'utente
                let allPlans = _allPlans;
                if (!allPlans || !allPlans.length) {
                    const { data, error } = await _queryWithTimeout(supabaseClient
                        .from('workout_plans')
                        .select('id, workout_exercises(id, exercise_name, exercise_slug, muscle_group, sets, reps, weight_kg, rest_seconds)')
                        .eq('user_id', user.id), 15000);
                    if (error) throw error;
                    allPlans = data || [];
                }

                const allExercises = (allPlans || []).flatMap(p => p.workout_exercises || []);
                const allExIds = allExercises.map(e => e.id);
                if (!allExIds.length) {
                    container.innerHTML = '<div class="all-empty">Nessun esercizio nelle tue schede.</div>';
                    return;
                }

                const { data: logs, error: logsErr } = await _queryWithTimeout(supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .in('exercise_id', allExIds)
                    .eq('user_id', user.id)
                    .order('log_date', { ascending: false })
                    .order('set_number', { ascending: true }), 15000);
                if (logsErr) throw logsErr;

                if (!logs?.length) {
                    _storicoLogsCache = [];
                    container.innerHTML = '<div class="all-empty">Nessun log registrato ancora.</div>';
                    return;
                }

                _storicoLogsCache = logs;

                // Mappa exercise_id → dati esercizio (primo match)
                const exById = {};
                for (const ex of allExercises) {
                    if (!exById[ex.id]) exById[ex.id] = ex;
                }

                // Raggruppa log per NOME esercizio (fonde log di stesso esercizio da schede diverse)
                const idToName = {};
                for (const ex of allExercises) idToName[ex.id] = ex.exercise_name;

                const byName = {};
                for (const l of logs) {
                    const name = idToName[l.exercise_id] || 'Sconosciuto';
                    if (!byName[name]) byName[name] = [];
                    byName[name].push(l);
                }

                // Filtro ricerca
                let names = Object.keys(byName).sort();
                const q = (_storicoSearch || '').trim().toLowerCase();
                if (q) names = names.filter(n => n.toLowerCase().includes(q));

                let html = `<div class="all-storico-back-wrap">
                    <button class="all-storico-back-btn" onclick="switchAllView('progressi')" aria-label="Torna ai progressi">
                        <span class="all-storico-back-arrow">←</span>
                        <span>Torna ai Progressi</span>
                    </button>
                </div>
                <div class="all-storico-search-wrap">
                    <input type="text" id="storicoSearch" class="all-storico-search" placeholder="Cerca esercizio..." value="${_escHtml(_storicoSearch)}" oninput="_storicoSearch=this.value;_renderStoricoList()">
                </div>
                <div class="all-storico-list" id="storicoList">${_buildStoricoListHtml(names, byName, exById)}</div>`;

                container.innerHTML = html;
                // Ripristina focus al campo ricerca dopo render
                const s = document.getElementById('storicoSearch');
                if (s && q) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
            } catch (e) {
                console.warn('[Allenamento] storico load failed:', e);
                container.innerHTML = '<div class="all-empty">Errore caricamento storico.</div>';
            }
        }

        // Re-render solo la lista storico (preserva input ricerca)
        function _renderStoricoList() {
            const listEl = document.getElementById('storicoList');
            if (!listEl) return;
            // Recupera dati già caricati dalla vista corrente
            const allExercises = (_allPlans || []).flatMap(p => p.workout_exercises || []);
            const exById = {};
            for (const ex of allExercises) if (!exById[ex.id]) exById[ex.id] = ex;
            const idToName = {};
            for (const ex of allExercises) idToName[ex.id] = ex.exercise_name;
            const byName = {};
            for (const l of _storicoLogsCache) {
                const name = idToName[l.exercise_id] || 'Sconosciuto';
                if (!byName[name]) byName[name] = [];
                byName[name].push(l);
            }
            let names = Object.keys(byName).sort();
            const q = (_storicoSearch || '').trim().toLowerCase();
            if (q) names = names.filter(n => n.toLowerCase().includes(q));
            listEl.innerHTML = _buildStoricoListHtml(names, byName, exById);
        }

        let _storicoLogsCache = [];

        function _buildStoricoListHtml(names, byName, exById) {
            if (!names.length) {
                return '<div class="all-empty">Nessun risultato.</div>';
            }
            let html = '';
            for (const name of names) {
                const logs = byName[name] || [];
                const nLogs = logs.length;
                const dates = new Set(logs.map(l => l.log_date));
                const nSessions = dates.size;
                const isOpen = _storicoExpanded.has(name);
                const dbEx = _findEx(name);
                const thumb = dbEx ? dbEx.immagine_url_small : '';

                html += `<div class="all-storico-card ${isOpen ? 'open' : ''}">
                    <div class="all-storico-header" onclick="toggleStoricoCard('${_escHtml(name)}')">
                        ${thumb ? `<img src="${thumb}" class="all-storico-thumb" alt="" loading="lazy">` : '<div class="all-storico-thumb all-storico-thumb-placeholder"></div>'}
                        <div class="all-storico-info">
                            <div class="all-storico-name">${_escHtml(name)}</div>
                            <div class="all-storico-meta">${nLogs} log · ${nSessions} ${nSessions === 1 ? 'sessione' : 'sessioni'}</div>
                        </div>
                        <span class="all-storico-chevron">${isOpen ? '&#9662;' : '&#8250;'}</span>
                    </div>`;

                if (isOpen) {
                    // Raggruppa logs per data
                    const byDate = {};
                    for (const l of logs) {
                        if (!byDate[l.log_date]) byDate[l.log_date] = [];
                        byDate[l.log_date].push(l);
                    }
                    const sortedDates = Object.keys(byDate).sort().reverse();
                    html += '<div class="all-storico-sessions">';
                    for (const d of sortedDates) {
                        const dayLogs = byDate[d].sort((a, b) => a.set_number - b.set_number);
                        // Potrebbero esserci log dello stesso nome ma exercise_id diversi (scheda diversa/giorno)
                        const byExId = {};
                        for (const l of dayLogs) {
                            if (!byExId[l.exercise_id]) byExId[l.exercise_id] = [];
                            byExId[l.exercise_id].push(l);
                        }
                        for (const exId in byExId) {
                            const exLogs = byExId[exId];
                            const ex = exById[exId];
                            const isCardio = ex && (ex.muscle_group || '').toLowerCase() === 'cardio';
                            html += `<div class="all-storico-session" data-date="${d}" data-ex-id="${exId}">
                                <div class="all-storico-session-header">
                                    <span class="all-storico-session-date">${_fmtDateAll(d)}</span>
                                    <button class="all-storico-session-delete" onclick="deleteStoricoDay('${exId}','${d}')" title="Elimina giornata">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                                    </button>
                                </div>
                                <div class="all-storico-session-grid ${isCardio ? 'cardio' : ''}">
                                    <div class="all-storico-grid-header">
                                        ${isCardio ? '<span>Set</span><span>Min</span><span></span>' : '<span>Set</span><span>Reps</span><span>Kg</span><span>Riposo</span><span></span>'}
                                    </div>`;
                            for (const l of exLogs) {
                                html += `<div class="all-storico-row" data-log-id="${l.id}">
                                    <span class="all-storico-set">${l.set_number}</span>
                                    <input type="number" inputmode="numeric" min="0" value="${l.reps_done ?? ''}" class="all-storico-input" data-field="reps_done">`;
                                if (!isCardio) {
                                    html += `<input type="number" inputmode="decimal" min="0" step="0.5" value="${l.weight_done ?? ''}" class="all-storico-input" data-field="weight_done">
                                    <input type="number" inputmode="numeric" min="0" value="${l.rest_done ?? ''}" class="all-storico-input" data-field="rest_done">`;
                                }
                                html += `<button class="all-storico-row-actions" onclick="saveStoricoLog('${l.id}', this)" title="Salva">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
                                </button>
                                <button class="all-storico-row-delete" onclick="deleteStoricoLog('${l.id}', this)" title="Elimina set">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                                </div>`;
                            }
                            html += '</div></div>';
                        }
                    }
                    html += '</div>';
                }

                html += '</div>';
            }
            return html;
        }

        function toggleStoricoCard(name) {
            if (_storicoExpanded.has(name)) _storicoExpanded.delete(name);
            else _storicoExpanded.add(name);
            _renderStoricoList();
        }

        async function saveStoricoLog(logId, btn) {
            const row = btn.closest('.all-storico-row');
            if (!row) return;
            const repsEl = row.querySelector('input[data-field="reps_done"]');
            const weightEl = row.querySelector('input[data-field="weight_done"]');
            const restEl = row.querySelector('input[data-field="rest_done"]');
            const updates = {
                reps_done: repsEl?.value ? parseInt(repsEl.value) : null,
                weight_done: weightEl?.value ? parseFloat(weightEl.value) : null,
                rest_done: restEl?.value ? parseInt(restEl.value) : null,
            };
            btn.disabled = true;
            try {
                const { error } = await _queryWithTimeout(supabaseClient
                    .from('workout_logs')
                    .update(updates)
                    .eq('id', logId), 15000);
                if (error) throw error;
                // Aggiorna cache locale
                const idx = _storicoLogsCache.findIndex(l => l.id === logId);
                if (idx >= 0) Object.assign(_storicoLogsCache[idx], updates);
                const idx2 = _allLogs.findIndex(l => l.id === logId);
                if (idx2 >= 0) Object.assign(_allLogs[idx2], updates);
                btn.classList.add('saved');
                setTimeout(() => btn.classList.remove('saved'), 1500);
                btn.disabled = false;
                if (typeof showToast === 'function') showToast('Modifica salvata', 'success');
            } catch (e) {
                console.error('[Storico] save error:', e);
                btn.disabled = false;
                if (typeof showToast === 'function') showToast('Errore salvataggio', 'error');
            }
        }

        async function deleteStoricoLog(logId, btn) {
            if (!confirm('Eliminare questo set?')) return;
            btn.disabled = true;
            try {
                await WorkoutLogStorage.deleteLog(logId);
                _storicoLogsCache = _storicoLogsCache.filter(l => l.id !== logId);
                _allLogs = _allLogs.filter(l => l.id !== logId);
                if (typeof showToast === 'function') showToast('Set eliminato', 'success');
                _renderStoricoList();
            } catch (e) {
                console.error('[Storico] delete set error:', e);
                btn.disabled = false;
                if (typeof showToast === 'function') showToast('Errore eliminazione', 'error');
            }
        }

        async function deleteStoricoDay(exerciseId, logDate) {
            if (!confirm(`Eliminare tutti i set del ${_fmtDateAll(logDate)}?`)) return;
            try {
                const toDel = _storicoLogsCache.filter(l => l.exercise_id === exerciseId && l.log_date === logDate);
                for (const l of toDel) {
                    await WorkoutLogStorage.deleteLog(l.id);
                }
                _storicoLogsCache = _storicoLogsCache.filter(l => !(l.exercise_id === exerciseId && l.log_date === logDate));
                _allLogs = _allLogs.filter(l => !(l.exercise_id === exerciseId && l.log_date === logDate));
                if (typeof showToast === 'function') showToast('Giornata eliminata', 'success');
                _renderStoricoList();
            } catch (e) {
                console.error('[Storico] delete day error:', e);
                if (typeof showToast === 'function') showToast('Errore eliminazione', 'error');
            }
        }

        // ── Render Progressi ──────────────────────────────────────────────
        // Raggruppa per NOME esercizio (non per ID), così log dello stesso
        // esercizio da schede/giorni diversi confluiscono in un unico grafico.
        async function renderProgressi() {
            const container = document.getElementById('allContent');
            const user = getCurrentUser();
            if (!user) return;

            container.innerHTML = '<div class="all-loading">Caricamento progressi...</div>';

            try {
                // Riusa _allPlans gia' in memoria (popolato da _refreshAllenamentoData).
                // Fallback alla query con timeout 15s se la cache e' vuota (es. utente
                // arriva qui prima del primo refresh).
                let allPlans = _allPlans;
                if (!allPlans || !allPlans.length) {
                    const { data, error } = await _queryWithTimeout(supabaseClient
                        .from('workout_plans')
                        .select('id, workout_exercises(id, exercise_name, muscle_group, sets, reps, weight_kg)')
                        .eq('user_id', user.id), 15000);
                    if (error) throw error;
                    allPlans = data || [];
                }

                const allExercises = (allPlans || []).flatMap(p => p.workout_exercises || []);
                const allExIds = allExercises.map(e => e.id);
                if (!allExIds.length) {
                    container.innerHTML = '<div class="all-empty">Nessun esercizio nelle tue schede.</div>';
                    return;
                }

                // Fetch ALL logs for this user's exercises (timeout 15s come safety net)
                const { data: logs, error: logsErr } = await _queryWithTimeout(supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .in('exercise_id', allExIds)
                    .eq('user_id', user.id)
                    .order('log_date', { ascending: true }), 15000);
                if (logsErr) throw logsErr;

                if (!logs?.length) {
                    container.innerHTML = '<div class="all-empty">Nessun log registrato ancora.<br>Inizia ad allenarti per vedere i progressi!</div>';
                    return;
                }

                // Map exercise_id → { name, muscle_group }
                const idToName = {};
                const idToMuscle = {};
                for (const ex of allExercises) {
                    idToName[ex.id] = ex.exercise_name;
                    idToMuscle[ex.id] = ex.muscle_group || '';
                }

                // Map exercise_name → muscle_group (first found)
                const nameToMuscle = {};
                for (const ex of allExercises) {
                    if (ex.muscle_group && !nameToMuscle[ex.exercise_name]) {
                        nameToMuscle[ex.exercise_name] = ex.muscle_group;
                    }
                }

                // Group logs by exercise NAME
                const logsByName = {};
                for (const l of logs) {
                    const name = idToName[l.exercise_id] || 'Sconosciuto';
                    if (!logsByName[name]) logsByName[name] = [];
                    logsByName[name].push(l);
                }

                // Get current target from active plan (if available)
                const activeExercises = _allPlan?.workout_exercises || [];
                const targetByName = {};
                for (const ex of activeExercises) {
                    targetByName[ex.exercise_name] = { sets: ex.sets, reps: ex.reps, weight_kg: ex.weight_kg };
                }

                // Available muscle groups (from data)
                const muscleGroups = [...new Set(Object.values(nameToMuscle).filter(Boolean))].sort();

                // Read active filters from persistent state
                const filterPeriod = _filterPeriod;
                const filterMuscle = _filterMuscle;

                // Apply time filter to logs
                let filteredLogs = logs;
                if (filterPeriod !== 'all') {
                    const now = new Date();
                    let cutoff;
                    if (filterPeriod === '7d') cutoff = new Date(now.getTime() - 7 * 86400000);
                    else if (filterPeriod === '30d') cutoff = new Date(now.getTime() - 30 * 86400000);
                    else if (filterPeriod === '90d') cutoff = new Date(now.getTime() - 90 * 86400000);
                    if (cutoff) {
                        const cutoffStr = _localDateStr(cutoff);
                        filteredLogs = logs.filter(l => l.log_date >= cutoffStr);
                    }
                }

                // Re-group filtered logs by name
                const filteredByName = {};
                for (const l of filteredLogs) {
                    const name = idToName[l.exercise_id] || 'Sconosciuto';
                    if (!filteredByName[name]) filteredByName[name] = [];
                    filteredByName[name].push(l);
                }

                // Apply muscle filter
                let exerciseNames = Object.keys(filteredByName).sort();
                if (filterMuscle !== 'all') {
                    exerciseNames = exerciseNames.filter(n => nameToMuscle[n] === filterMuscle);
                }

                let html = '';

                // Shortcut verso lo Storico (vista separata, accessibile solo da qui)
                html += `<div class="all-progressi-nav">
                    <button class="all-progressi-storico-btn" onclick="switchAllView('storico')" aria-label="Vedi storico allenamenti">
                        <span class="all-progressi-storico-icon">📂</span>
                        <span class="all-progressi-storico-label">Vedi Storico allenamenti</span>
                        <span class="all-progressi-storico-arrow">→</span>
                    </button>
                </div>`;

                // Filters bar
                html += `<div class="all-filters">
                    <select id="filterPeriod" onchange="_filterPeriod=this.value;renderProgressi()">
                        <option value="all" ${filterPeriod === 'all' ? 'selected' : ''}>Tutto</option>
                        <option value="7d" ${filterPeriod === '7d' ? 'selected' : ''}>Ultimi 7 giorni</option>
                        <option value="30d" ${filterPeriod === '30d' ? 'selected' : ''}>Ultimi 30 giorni</option>
                        <option value="90d" ${filterPeriod === '90d' ? 'selected' : ''}>Ultimi 90 giorni</option>
                    </select>
                    <select id="filterMuscle" onchange="_filterMuscle=this.value;renderProgressi()">
                        <option value="all" ${filterMuscle === 'all' ? 'selected' : ''}>Tutti i muscoli</option>
                        ${muscleGroups.map(mg => `<option value="${_escHtml(mg)}" ${filterMuscle === mg ? 'selected' : ''}>${_escHtml(mg)}</option>`).join('')}
                    </select>
                </div>`;

                // Stats overview (filtered)
                // Filter logs for stats based on muscle filter too
                const statsLogs = filterMuscle === 'all' ? filteredLogs
                    : filteredLogs.filter(l => nameToMuscle[idToName[l.exercise_id]] === filterMuscle);
                const totalSessions = new Set(statsLogs.map(l => l.exercise_id + '|' + l.log_date)).size;
                const totalSets = statsLogs.length;
                const totalVolume = statsLogs.reduce((sum, l) => sum + ((l.weight_done || 0) * (l.reps_done || 0)), 0);
                html += `<div class="all-stats-row">
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalSessions}</div>
                        <div class="all-stat-label">Sessioni</div>
                    </div>
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalSets}</div>
                        <div class="all-stat-label">Serie totali</div>
                    </div>
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalVolume >= 1000 ? (totalVolume/1000).toFixed(1) + 't' : totalVolume + 'kg'}</div>
                        <div class="all-stat-label">Volume totale</div>
                    </div>
                </div>`;

                // Per-exercise-NAME progress charts (sorted, filtered)
                let chartIdx = 0;
                if (!exerciseNames.length && (filterMuscle !== 'all' || filterPeriod !== 'all')) {
                    html += '<div class="all-empty">Nessun risultato per i filtri selezionati.</div>';
                }
                for (const exName of exerciseNames) {
                    const exLogs = filteredByName[exName];
                    if (!exLogs?.length) continue;

                    // Detect cardio: muscle_group = "Cardio"
                    const isCardio = (nameToMuscle[exName] || '').toLowerCase() === 'cardio';
                    const unit = isCardio ? 'min' : 'kg';

                    // Raggruppa per (exercise_id, log_date) — max weight (o reps per cardio) per sessione
                    const sessionMap = {};
                    for (const l of exLogs) {
                        const val = isCardio ? l.reps_done : l.weight_done;
                        if (val == null) continue;
                        const key = l.exercise_id + '|' + l.log_date;
                        if (!sessionMap[key] || val > sessionMap[key].value) {
                            sessionMap[key] = { date: l.log_date, value: val };
                        }
                    }
                    const sessions = Object.values(sessionMap).sort((a, b) =>
                        a.date.localeCompare(b.date) || a.value - b.value
                    );
                    if (!sessions.length) continue;

                    const values = sessions.map(s => s.value);
                    const dateCounts = {};
                    const labels = sessions.map(s => {
                        const fmt = _fmtDateAll(s.date);
                        dateCounts[s.date] = (dateCounts[s.date] || 0) + 1;
                        return fmt;
                    });
                    const dateOccurrences = {};
                    for (let i = 0; i < labels.length; i++) {
                        const d = sessions[i].date;
                        if (dateCounts[d] > 1) {
                            dateOccurrences[d] = (dateOccurrences[d] || 0) + 1;
                            labels[i] += ' (' + dateOccurrences[d] + ')';
                        }
                    }

                    const maxW = Math.max(...values);
                    const lastW = values[values.length - 1];
                    const trend = values.length >= 2 ? lastW - values[0] : 0;
                    const trendSign = trend > 0 ? '+' : '';
                    const trendClass = trend > 0 ? 'all-trend-up' : trend < 0 ? 'all-trend-down' : '';
                    const target = targetByName[exName];
                    const targetStr = target
                        ? (isCardio ? `Target: ${target.reps} min` : `Target: ${target.sets}×${target.reps}${target.weight_kg != null ? ' @ ' + target.weight_kg + 'kg' : ''}`)
                        : '';

                    const canvasId = 'pchart-' + (chartIdx++);
                    html += `<div class="all-progress-card">
                        <div class="all-progress-header">
                            <div class="all-progress-name">${_escHtml(exName)}</div>
                            ${targetStr ? `<div class="all-progress-meta">${targetStr}</div>` : ''}
                        </div>
                        <canvas id="${canvasId}" width="320" height="140"></canvas>
                        <div class="all-progress-stats">
                            <span>Max <strong>${maxW}${unit}</strong></span>
                            <span>Ultimo <strong>${lastW}${unit}</strong></span>
                            <span class="${trendClass}">Trend <strong>${trendSign}${trend.toFixed(1)}${unit}</strong></span>
                            <span>${sessions.length} sessioni</span>
                        </div>
                    </div>`;

                    setTimeout(((cid, lbl, val) => () => {
                        const canvas = document.getElementById(cid);
                        if (canvas) drawDarkLineChart(canvas, lbl, val, '#00AEEF');
                    })(canvasId, labels, values), 50);
                }

                // Volume per session chart (filtered)
                const volByDate = {};
                for (const l of statsLogs) {
                    if (l.weight_done != null && l.reps_done != null) {
                        const vol = l.weight_done * l.reps_done;
                        volByDate[l.log_date] = (volByDate[l.log_date] || 0) + vol;
                    }
                }
                const volDates = Object.keys(volByDate).sort();
                if (volDates.length > 1) {
                    const volValues = volDates.map(d => Math.round(volByDate[d]));
                    const volLabels = volDates.map(d => _fmtDateAll(d));
                    const volCanvasId = 'pchart-volume';
                    html += `<div class="all-progress-card all-progress-card--volume">
                        <div class="all-progress-header">
                            <div class="all-progress-name">Volume Totale per Sessione</div>
                        </div>
                        <canvas id="${volCanvasId}" width="320" height="140"></canvas>
                        <div class="all-progress-stats">
                            <span>Max <strong>${Math.max(...volValues)}kg</strong></span>
                            <span>Ultimo <strong>${volValues[volValues.length - 1]}kg</strong></span>
                        </div>
                    </div>`;
                    setTimeout(() => {
                        const canvas = document.getElementById(volCanvasId);
                        if (canvas) drawDarkLineChart(canvas, volLabels, volValues, '#22c55e');
                    }, 50);
                }

                container.innerHTML = html;
            } catch (e) {
                console.error('[Progressi] error:', e);
                container.innerHTML = '<div class="all-empty">Errore caricamento progressi.</div>';
            }
        }

        function _fmtDateAll(iso) {
            if (!iso) return '';
            const d = new Date(iso + 'T00:00:00');
            return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
        }


        // ── Refined line chart (canvas) ──────────────────────────────────
        function drawDarkLineChart(canvas, labels, values, color) {
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const w = rect.width > 0 ? rect.width : 320;
            const h = 150;
            canvas.width = Math.round(w * 2);
            canvas.height = Math.round(h * 2);
            ctx.scale(2, 2);

            // Background
            ctx.fillStyle = '#f8fafc';
            const r = 10;
            ctx.beginPath();
            ctx.moveTo(r, 0); ctx.lineTo(w - r, 0); ctx.quadraticCurveTo(w, 0, w, r);
            ctx.lineTo(w, h - r); ctx.quadraticCurveTo(w, h, w - r, h);
            ctx.lineTo(r, h); ctx.quadraticCurveTo(0, h, 0, h - r);
            ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath();
            ctx.fill();

            const pad = { top: 22, right: 14, bottom: 30, left: 42 };
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;

            if (!values.length) return;
            const minV = Math.min(...values);
            const maxV = Math.max(...values);
            const range = maxV - minV || 1;
            const yMin = Math.max(0, minV - range * 0.1);
            const yMax = maxV + range * 0.1;
            const yRange = yMax - yMin || 1;

            // Grid lines — dashed, subtle
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 0.8;
            ctx.setLineDash([3, 3]);
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + ch - (ch * i / 4);
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
                ctx.fillStyle = '#94a3b8';
                ctx.font = '500 8.5px system-ui, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(Math.round(yMin + yRange * i / 4), pad.left - 6, y + 3);
            }
            ctx.setLineDash([]);

            // Data points
            const pts = values.map((v, i) => ({
                x: pad.left + (values.length === 1 ? cw / 2 : (i / (values.length - 1)) * cw),
                y: pad.top + ch - ((v - yMin) / yRange) * ch,
                v,
            }));

            // Area fill — smooth gradient
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pad.top + ch);
            pts.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
            grad.addColorStop(0, color + '30');
            grad.addColorStop(0.6, color + '10');
            grad.addColorStop(1, color + '02');
            ctx.fillStyle = grad;
            ctx.fill();

            // Line — thicker, rounded
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();

            // Dots
            pts.forEach((p, i) => {
                const isLast = i === pts.length - 1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, isLast ? 4.5 : 3, 0, Math.PI * 2);
                ctx.fillStyle = isLast ? color : '#fff';
                ctx.fill();
                ctx.strokeStyle = isLast ? '#fff' : color;
                ctx.lineWidth = isLast ? 2 : 1.5;
                ctx.stroke();
                if (isLast) {
                    // Glow ring on last point
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
                    ctx.strokeStyle = color + '25';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });

            // X labels
            ctx.fillStyle = '#94a3b8';
            ctx.font = '500 7.5px system-ui, sans-serif';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(labels.length / 6));
            labels.forEach((lbl, i) => {
                if (i % step === 0 || i === labels.length - 1) {
                    ctx.fillText(lbl, pts[i].x, pad.top + ch + 14);
                }
            });

            // Value badge on last point
            const last = pts[pts.length - 1];
            const label = last.v + 'kg';
            ctx.font = 'bold 9.5px system-ui, sans-serif';
            const tw = ctx.measureText(label).width;
            const bx = Math.min(last.x, w - pad.right - tw / 2 - 6);
            const by = last.y - 14;
            // Badge background
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            const br = 4;
            ctx.moveTo(bx - tw/2 - 5 + br, by - 8);
            ctx.lineTo(bx + tw/2 + 5 - br, by - 8);
            ctx.quadraticCurveTo(bx + tw/2 + 5, by - 8, bx + tw/2 + 5, by - 8 + br);
            ctx.lineTo(bx + tw/2 + 5, by + 2 - br);
            ctx.quadraticCurveTo(bx + tw/2 + 5, by + 2, bx + tw/2 + 5 - br, by + 2);
            ctx.lineTo(bx - tw/2 - 5 + br, by + 2);
            ctx.quadraticCurveTo(bx - tw/2 - 5, by + 2, bx - tw/2 - 5, by + 2 - br);
            ctx.lineTo(bx - tw/2 - 5, by - 8 + br);
            ctx.quadraticCurveTo(bx - tw/2 - 5, by - 8, bx - tw/2 - 5 + br, by - 8);
            ctx.closePath();
            ctx.fill();
            // Badge text
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText(label, bx, by - 1);
        }

        // ── Swipe-to-delete + long-press drag-to-reorder ─────────────
        let _dragState = null;
        let _swipeState = null;

        function _initSwipeAndDrag() {
            const cards = document.querySelectorAll('.all-ex-card[data-ex-id], .all-ss-card[data-ss-id]');
            cards.forEach(card => {
                const header = card.querySelector('.all-ex-header') || card.querySelector('.all-ss-header');
                if (!header) return;
                header.addEventListener('touchstart', _onTouchStart, { passive: true });
                header.addEventListener('touchmove', _onTouchMove, { passive: false });
                header.addEventListener('touchend', _onTouchEnd, { passive: true });
            });
        }

        function _onTouchStart(e) {
            const touch = e.touches[0];
            const card = e.currentTarget.closest('.all-ex-card') || e.currentTarget.closest('.all-ss-card');
            if (!card) return;

            // Reset any other open swipe
            _resetAllSwipes(card);

            _swipeState = {
                card,
                startX: touch.clientX,
                startY: touch.clientY,
                currentX: 0,
                swiping: false,
                locked: false, // direction locked
            };

            // Long press for drag
            _swipeState.longPressTimer = setTimeout(() => {
                if (_swipeState && _swipeState.card === card && !_swipeState.swiping) {
                    _startDrag(card, touch);
                }
            }, 500);
        }

        function _onTouchMove(e) {
            if (!_swipeState) return;
            const touch = e.touches[0];
            const dx = touch.clientX - _swipeState.startX;
            const dy = touch.clientY - _swipeState.startY;

            // If dragging (reorder mode)
            if (_dragState) {
                e.preventDefault();
                _handleDragMove(touch);
                return;
            }

            // Direction lock: decide if horizontal swipe or vertical scroll
            if (!_swipeState.locked) {
                if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                    _swipeState.locked = true;
                    _swipeState.swiping = Math.abs(dx) > Math.abs(dy);
                    clearTimeout(_swipeState.longPressTimer);
                    if (!_swipeState.swiping) { _swipeState = null; return; }
                } else {
                    return;
                }
            }

            if (!_swipeState.swiping) return;
            e.preventDefault();

            // Only allow swipe left (negative dx)
            const clampedX = Math.min(0, Math.max(dx, -100));
            _swipeState.currentX = clampedX;
            const content = _swipeState.card.querySelector('.all-ex-swipe-content');
            if (content) content.style.transform = `translateX(${clampedX}px)`;
        }

        function _onTouchEnd(e) {
            clearTimeout(_swipeState?.longPressTimer);

            // Handle drag end
            if (_dragState) {
                _endDrag();
                _swipeState = null;
                return;
            }

            if (!_swipeState || !_swipeState.swiping) { _swipeState = null; return; }

            const content = _swipeState.card.querySelector('.all-ex-swipe-content');
            // Snap: if swiped more than 60px, hold open; else snap back
            if (_swipeState.currentX < -60) {
                if (content) { content.style.transition = 'transform 0.2s ease'; content.style.transform = 'translateX(-85px)'; }
                _swipeState.card.classList.add('all-ex-swiped');
            } else {
                if (content) { content.style.transition = 'transform 0.2s ease'; content.style.transform = ''; }
                _swipeState.card.classList.remove('all-ex-swiped');
            }
            // Reset transition after animation
            setTimeout(() => { if (content) content.style.transition = ''; }, 200);
            _swipeState = null;
        }

        function _resetAllSwipes(exceptCard) {
            document.querySelectorAll('.all-ex-card.all-ex-swiped, .all-ss-card.all-ex-swiped').forEach(card => {
                if (card === exceptCard) return;
                const content = card.querySelector('.all-ex-swipe-content');
                if (content) { content.style.transition = 'transform 0.2s ease'; content.style.transform = ''; }
                card.classList.remove('all-ex-swiped');
                setTimeout(() => { if (content) content.style.transition = ''; }, 200);
            });
        }

        // ── Long-press drag to reorder ──────────────────────────────────
        function _startDrag(card, touch) {
            if (navigator.vibrate) navigator.vibrate(30);

            const container = card.parentElement;
            const cards = [...container.querySelectorAll('.all-ex-card[data-ex-id], .all-ss-card[data-ss-id]')];
            const idx = cards.indexOf(card);

            _dragState = {
                card,
                container,
                cards,
                startIdx: idx,
                currentIdx: idx,
                startY: touch.clientY,
                cardHeight: card.offsetHeight + parseInt(getComputedStyle(card).marginBottom),
            };

            card.classList.add('all-ex-dragging');
            container.classList.add('reordering');
            const header = card.querySelector('.all-ex-header') || card.querySelector('.all-ss-header');
            if (header) header.removeAttribute('onclick');
        }

        function _handleDragMove(touch) {
            if (!_dragState) return;
            const dy = touch.clientY - _dragState.startY;
            _dragState.card.style.transform = `translateY(${dy}px) scale(1.02)`;

            // Determine new index based on movement
            const offsetSteps = Math.round(dy / _dragState.cardHeight);
            const newIdx = Math.max(0, Math.min(_dragState.cards.length - 1, _dragState.startIdx + offsetSteps));

            if (newIdx !== _dragState.currentIdx) {
                // Move other cards to make room
                _dragState.cards.forEach((c, i) => {
                    if (c === _dragState.card) return;
                    if (_dragState.startIdx < newIdx) {
                        // Dragging down: cards between old and new move up
                        c.style.transform = (i > _dragState.startIdx && i <= newIdx) ? `translateY(-${_dragState.cardHeight}px)` : '';
                    } else {
                        // Dragging up: cards between new and old move down
                        c.style.transform = (i >= newIdx && i < _dragState.startIdx) ? `translateY(${_dragState.cardHeight}px)` : '';
                    }
                    c.style.transition = 'transform 0.2s ease';
                });
                _dragState.currentIdx = newIdx;
            }
        }

        async function _endDrag() {
            if (!_dragState) return;
            const { card, cards, startIdx, currentIdx } = _dragState;

            // Reset visual state
            card.classList.remove('all-ex-dragging');
            _dragState.container.classList.remove('reordering');
            card.style.transform = '';
            card.style.transition = '';
            cards.forEach(c => { c.style.transform = ''; c.style.transition = ''; });
            window.getSelection()?.removeAllRanges();

            // Restore onclick
            const exId = card.dataset.exId;
            const ssId = card.dataset.ssId;
            const header = card.querySelector('.all-ex-header') || card.querySelector('.all-ss-header');
            if (header) {
                if (ssId) header.setAttribute('onclick', `openSupersetDetail('${ssId}')`);
                else if (exId) header.setAttribute('onclick', `openExerciseDetail('${exId}')`);
            }

            _dragState = null;

            if (startIdx === currentIdx) return;

            // Build visual item order from DOM cards, then flatten to exercise order
            const reordered = [...cards];
            const [moved] = reordered.splice(startIdx, 1);
            reordered.splice(currentIdx, 0, moved);

            // Flatten: each visual card maps to 1 or 2 exercises
            const allDayEx = (_allPlan?.workout_exercises || []).filter(e => e.day_label === _activeDay);
            const newOrder = [];
            for (const c of reordered) {
                if (c.dataset.ssId) {
                    // Superset: find both exercises in the group, keep their relative order
                    const pair = allDayEx.filter(e => e.superset_group === c.dataset.ssId)
                        .sort((a, b) => a.sort_order - b.sort_order);
                    newOrder.push(...pair);
                } else if (c.dataset.exId) {
                    const ex = allDayEx.find(e => e.id === c.dataset.exId);
                    if (ex) newOrder.push(ex);
                }
            }

            // Update sort_order
            try {
                for (let i = 0; i < newOrder.length; i++) {
                    if (newOrder[i].sort_order !== i) {
                        newOrder[i].sort_order = i;
                        await WorkoutPlanStorage.updateExercise(newOrder[i].id, { sort_order: i });
                    }
                }
                renderScheda();
            } catch (e) {
                console.error('[Allenamento] reorder error:', e);
                if (typeof showToast === 'function') showToast('Errore riordino', 'error');
                renderScheda();
            }
        }

        // ── Delete exercise from plan ───────────────────────────────────
        async function deleteExerciseFromPlan(exId) {
            if (!confirm('Eliminare questo esercizio dalla scheda?')) return;
            try {
                await WorkoutPlanStorage.deleteExercise(exId);
                if (_allPlan) {
                    _allPlan.workout_exercises = (_allPlan.workout_exercises || []).filter(e => e.id !== exId);
                }
                renderScheda();
                if (typeof showToast === 'function') showToast('Esercizio eliminato', 'success');
            } catch (e) {
                console.error('[Allenamento] delete exercise error:', e);
                if (typeof showToast === 'function') showToast('Errore eliminazione', 'error');
            }
        }

        async function deleteSupersetFromPlan(groupId) {
            if (!confirm('Eliminare questa super serie dalla scheda?')) return;
            try {
                const toDelete = (_allPlan?.workout_exercises || []).filter(e => e.superset_group === groupId);
                for (const ex of toDelete) {
                    await WorkoutPlanStorage.deleteExercise(ex.id);
                }
                if (_allPlan) {
                    _allPlan.workout_exercises = (_allPlan.workout_exercises || []).filter(e => e.superset_group !== groupId);
                }
                renderScheda();
                if (typeof showToast === 'function') showToast('Super Serie eliminata', 'success');
            } catch (e) {
                console.error('[Allenamento] delete superset error:', e);
                if (typeof showToast === 'function') showToast('Errore eliminazione', 'error');
            }
        }

        // ── Aggiungi giorno alla scheda ─────────────────────────────
        // ── Day tab interactions: long press = drag reorder, double tap = rename ──
        let _dayDragState = null;
        let _dayLastTap = 0;

        function _initDayTabLongPress() {
            const tabs = document.querySelectorAll('.all-day-tab[data-day]');
            tabs.forEach(tab => {
                let longTimer = null;
                let moved = false;
                let startX = 0, startY = 0;

                tab.addEventListener('touchstart', (e) => {
                    moved = false;
                    const touch = e.touches[0];
                    startX = touch.clientX;
                    startY = touch.clientY;
                    longTimer = setTimeout(() => {
                        if (!moved) {
                            e.preventDefault();
                            if (navigator.vibrate) navigator.vibrate(30);
                            _startDayDrag(tab, touch);
                        }
                    }, 500);
                }, { passive: false });

                tab.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    if (_dayDragState) {
                        e.preventDefault();
                        _handleDayDragMove(touch);
                        return;
                    }
                    if (Math.abs(touch.clientX - startX) > 8 || Math.abs(touch.clientY - startY) > 8) {
                        moved = true;
                        clearTimeout(longTimer);
                    }
                }, { passive: false });

                tab.addEventListener('touchend', (e) => {
                    clearTimeout(longTimer);
                    if (_dayDragState) {
                        _endDayDrag();
                        e.preventDefault();
                        return;
                    }
                });

                // Double tap → menu rinomina/elimina
                tab.addEventListener('click', (e) => {
                    if (_dayDragState) return;
                    const now = Date.now();
                    if (now - _dayLastTap < 350) {
                        e.preventDefault();
                        e.stopPropagation();
                        _showDayMenu(tab.dataset.day);
                        _dayLastTap = 0;
                    } else {
                        _dayLastTap = now;
                    }
                });

                // Desktop: double click → menu
                tab.addEventListener('dblclick', (e) => {
                    e.preventDefault();
                    _showDayMenu(tab.dataset.day);
                });
                // Blocca context menu nativo su mobile (evita "elimina" indesiderato)
                tab.addEventListener('contextmenu', (e) => e.preventDefault());
            });
        }

        function _showDayMenu(dayLabel) {
            const old = document.getElementById('dayMenuOverlay');
            if (old) old.remove();
            const overlay = document.createElement('div');
            overlay.id = 'dayMenuOverlay';
            overlay.className = 'all-day-menu-overlay';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
            overlay.innerHTML = `
                <div class="all-day-menu">
                    <div class="all-day-menu-title">${_escHtml(dayLabel)}</div>
                    <button class="all-day-menu-btn" onclick="document.getElementById('dayMenuOverlay').remove();_renameDayTab('${_escHtml(dayLabel).replace(/'/g, "\\'")}')">
                        ✏️ Rinomina
                    </button>
                    <button class="all-day-menu-btn all-day-menu-btn--danger" onclick="document.getElementById('dayMenuOverlay').remove();_deleteDayFromScheda('${_escHtml(dayLabel).replace(/'/g, "\\'")}')">
                        🗑️ Elimina
                    </button>
                </div>`;
            document.body.appendChild(overlay);
        }

        function _startDayDrag(tab, touch) {
            const tabsContainer = tab.closest('.all-day-tabs');
            const allTabs = [...tabsContainer.querySelectorAll('.all-day-tab[data-day]')];
            const idx = allTabs.indexOf(tab);

            _dayDragState = {
                tab,
                container: tabsContainer,
                tabs: allTabs,
                startIdx: idx,
                currentIdx: idx,
                startX: touch.clientX,
                tabWidth: tab.offsetWidth + parseFloat(getComputedStyle(tabsContainer).gap || 0),
            };

            tab.classList.add('all-day-tab-dragging');
            tabsContainer.classList.add('reordering');
        }

        function _handleDayDragMove(touch) {
            if (!_dayDragState) return;
            const dx = touch.clientX - _dayDragState.startX;
            _dayDragState.tab.style.transform = `translateX(${dx}px) scale(1.05)`;

            const offsetSteps = Math.round(dx / _dayDragState.tabWidth);
            const newIdx = Math.max(0, Math.min(_dayDragState.tabs.length - 1, _dayDragState.startIdx + offsetSteps));

            if (newIdx !== _dayDragState.currentIdx) {
                _dayDragState.tabs.forEach((t, i) => {
                    if (t === _dayDragState.tab) return;
                    if (_dayDragState.startIdx < newIdx) {
                        t.style.transform = (i > _dayDragState.startIdx && i <= newIdx) ? `translateX(-${_dayDragState.tabWidth}px)` : '';
                    } else {
                        t.style.transform = (i >= newIdx && i < _dayDragState.startIdx) ? `translateX(${_dayDragState.tabWidth}px)` : '';
                    }
                    t.style.transition = 'transform 0.2s ease';
                });
                _dayDragState.currentIdx = newIdx;
            }
        }

        async function _endDayDrag() {
            if (!_dayDragState) return;
            const { tab, tabs, container, startIdx, currentIdx } = _dayDragState;

            tab.classList.remove('all-day-tab-dragging');
            container.classList.remove('reordering');
            tab.style.transform = '';
            tab.style.transition = '';
            tabs.forEach(t => { t.style.transform = ''; t.style.transition = ''; });
            window.getSelection()?.removeAllRanges();

            _dayDragState = null;
            if (startIdx === currentIdx) return;

            // Riordina i giorni e riassegna sort_order a tutti gli esercizi
            const dayOrder = tabs.map(t => t.dataset.day);
            const [movedDay] = dayOrder.splice(startIdx, 1);
            dayOrder.splice(currentIdx, 0, movedDay);

            try {
                let sortCounter = 0;
                for (const dayLabel of dayOrder) {
                    const dayExercises = (_allPlan.workout_exercises || [])
                        .filter(e => e.day_label === dayLabel)
                        .sort((a, b) => a.sort_order - b.sort_order);
                    for (const ex of dayExercises) {
                        if (ex.sort_order !== sortCounter) {
                            ex.sort_order = sortCounter;
                            await WorkoutPlanStorage.updateExercise(ex.id, { sort_order: sortCounter });
                        }
                        sortCounter++;
                    }
                }
                renderScheda();
            } catch (e) {
                console.error('[Allenamento] day reorder error:', e);
                if (typeof showToast === 'function') showToast('Errore riordino giorni', 'error');
                renderScheda();
            }
        }

        async function _renameDayTab(dayLabel) {
            const newName = prompt('Rinomina giorno:', dayLabel);
            if (!newName || !newName.trim() || newName.trim() === dayLabel) return;
            const trimmed = newName.trim();
            const existingDays = [...new Set((_allPlan.workout_exercises || []).map(e => e.day_label))];
            if (existingDays.includes(trimmed)) {
                if (typeof showToast === 'function') showToast('Questo nome esiste già', 'error');
                return;
            }
            try {
                const dayExercises = (_allPlan.workout_exercises || []).filter(e => e.day_label === dayLabel);
                for (const ex of dayExercises) {
                    ex.day_label = trimmed;
                    await WorkoutPlanStorage.updateExercise(ex.id, { day_label: trimmed });
                }
                if (_activeDay === dayLabel) _activeDay = trimmed;
                renderScheda();
                if (typeof showToast === 'function') showToast('Giorno rinominato', 'success');
            } catch (e) {
                console.error('[Allenamento] rename day error:', e);
                if (typeof showToast === 'function') showToast('Errore rinomina', 'error');
            }
        }

        async function _deleteDayFromScheda(dayLabel) {
            if (!_allPlan) return;
            const dayExercises = (_allPlan.workout_exercises || []).filter(e => e.day_label === dayLabel);
            if (!confirm(`Eliminare "${dayLabel}" e i suoi ${dayExercises.length} esercizi?`)) return;
            try {
                for (const ex of dayExercises) {
                    await WorkoutPlanStorage.deleteExercise(ex.id);
                }
                _allPlan.workout_exercises = (_allPlan.workout_exercises || []).filter(e => e.day_label !== dayLabel);
                if (_activeDay === dayLabel) _activeDay = null;
                renderScheda();
                if (typeof showToast === 'function') showToast(`"${dayLabel}" eliminato`, 'success');
            } catch (e) {
                console.error('[Allenamento] delete day error:', e);
                if (typeof showToast === 'function') showToast('Errore eliminazione giorno', 'error');
            }
        }

        let _pendingDayLabel = null; // giorno in attesa di primo esercizio

        function addDayToScheda() {
            if (!_allPlan) return;
            const exercises = _allPlan.workout_exercises || [];
            const existingDays = [...new Set(exercises.map(e => e.day_label))];
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let nextLetter = 'A';
            for (const l of letters) {
                if (!existingDays.includes('Giorno ' + l)) { nextLetter = l; break; }
            }
            const name = prompt('Nome del nuovo giorno:', 'Giorno ' + nextLetter);
            if (!name || !name.trim()) return;
            const dayLabel = name.trim();
            if (existingDays.includes(dayLabel)) {
                if (typeof showToast === 'function') showToast('Questo giorno esiste già', 'error');
                return;
            }
            // Salva il giorno pendente e apri il picker — il giorno verrà creato
            // quando l'utente sceglie il primo esercizio
            _pendingDayLabel = dayLabel;
            openExercisePicker();
        }

        // ── Exercise picker (add exercise to current plan/day) ──────────
        let _pickerActiveCat = '';

        // Flag: abbiamo pushato uno stato in history per il picker?

        async function pickExerciseFromPicker(exerciseName) {
            // Route to superset flow if active
            if (_supersetMode) { _supersetPickExercise(exerciseName); return; }

            const ex = _findEx(exerciseName);
            const isCardio = ex && (ex.categoria || '').toLowerCase() === 'cardio';

            // Chiedi serie, ripetizioni, riposo
            let sets = 1, reps = '20', rest = 0;
            if (!isCardio) {
                const setsVal = prompt('Numero di serie:', '3');
                if (setsVal === null) return;
                sets = parseInt(setsVal) || 3;

                const repsVal = prompt('Numero di ripetizioni:', '10');
                if (repsVal === null) return;
                reps = repsVal || '10';

                const restVal = prompt('Riposo tra le serie (secondi):', '90');
                if (restVal === null) return;
                rest = parseInt(restVal) || 90;
            }

            const dayLabel = _pendingDayLabel || _activeDay || 'Giorno A';
            _pendingDayLabel = null;
            closeExercisePicker();
            try {
                // Rende esplicito anche qui il posizionamento in coda:
                // nuovo esercizio sempre alla fine della scheda.
                const allExercises = _allPlan?.workout_exercises || [];
                const maxOrder = allExercises.reduce((m, e) => Math.max(m, e.sort_order ?? -1), -1);
                const newEx = await WorkoutPlanStorage.addExercise(_allPlan.id, {
                    day_label: dayLabel,
                    exercise_name: exerciseName,
                    muscle_group: ex ? ex.categoria : null,
                    sort_order: maxOrder + 1,
                    sets,
                    reps,
                    weight_kg: null,
                    rest_seconds: rest,
                    notes: null,
                });
                // Aggiorna anche _allPlan locale (WorkoutPlanStorage._cache è separato)
                _allPlan.workout_exercises = _allPlan.workout_exercises || [];
                _allPlan.workout_exercises.push(newEx);
                _activeDay = dayLabel;
                renderScheda();
                if (typeof showToast === 'function') showToast('Esercizio aggiunto!', 'success');
            } catch (e) {
                console.error('[Allenamento] add exercise error:', e);

            }
        }

        // ── Superset picker flow ─────────────────────────────────────────
        let _supersetMode = false;

        function openSupersetPicker() {
            _supersetMode = true;

        function _supersetPickExercise(exerciseName) {
            const ex = _findEx(exerciseName);
            const isCardio = ex && (ex.categoria || '').toLowerCase() === 'cardio';
            let reps = '10';
            if (!isCardio) {
                const repsVal = prompt('Numero di ripetizioni:', '10');
                if (repsVal === null) { _supersetMode = false; closeExercisePicker(); return; }
                reps = repsVal || '10';
            } else { reps = '20'; }

            if (_supersetStep === 0) {
                _supersetFirst = { name: exerciseName, ex, reps, muscle_group: ex ? ex.categoria : null };
                _supersetStep = 1;
                _pickerActiveCat = '';
                const catsEl = document.getElementById('allPickerCats');
                const listEl = document.getElementById('allPickerList');
                const searchEl = document.getElementById('allPickerSearch');
                if (catsEl) catsEl.style.display = '';
                if (listEl) listEl.style.display = 'none';
                if (searchEl) searchEl.value = '';
                document.querySelectorAll('.schede-picker-cat-chip').forEach(ch => ch.classList.remove('active'));
                const title = document.querySelector('#allExPickerOverlay .schede-picker-title');
                if (title) title.textContent = 'Super Serie \u2014 Esercizio 2 di 2';
            } else {
                // Serie condivise per entrambi gli esercizi
                const setsVal = prompt('Numero di serie (per entrambi):', '3');
                if (setsVal === null) { _supersetMode = false; closeExercisePicker(); return; }
                const sets = parseInt(setsVal) || 3;
                const restVal = prompt('Riposo dopo la super serie (secondi):', '90');
                if (restVal === null) { _supersetMode = false; closeExercisePicker(); return; }
                const rest = parseInt(restVal) || 90;
                _supersetFirst.sets = sets;
                _supersetMode = false;
                closeExercisePicker();
                _saveSupersetPair(
                    _supersetFirst,
                    { name: exerciseName, ex, sets, reps, muscle_group: ex ? ex.categoria : null },
                    rest
                );
            }
        }

        async function _saveSupersetPair(first, second, rest) {
            const dayLabel = _pendingDayLabel || _activeDay || 'Giorno A';
            _pendingDayLabel = null;
            try {
                // _allPlan non è nella cache WorkoutPlanStorage: calcola sort_order qui
                // per posizionare la super serie in fondo alla lista come gli esercizi singoli
                const allExercises = _allPlan.workout_exercises || [];
                const maxOrder = allExercises.reduce((m, e) => Math.max(m, e.sort_order), -1);
                const result = await WorkoutPlanStorage.addSuperset(_allPlan.id, {
                    day_label: dayLabel,
                    exercise_name: first.name,
                    muscle_group: first.muscle_group,
                    sets: first.sets, reps: first.reps,
                    weight_kg: null, notes: null,
                    sort_order: maxOrder + 1,
                }, {
                    day_label: dayLabel,
                    exercise_name: second.name,
                    muscle_group: second.muscle_group,
                    sets: second.sets, reps: second.reps,
                    rest_seconds: rest,
                    weight_kg: null, notes: null,
                    sort_order: maxOrder + 2,
                });
                // Sync local _allPlan (non è nella cache WorkoutPlanStorage)
                _allPlan.workout_exercises.push(result.first, result.second);
                _activeDay = dayLabel;
                renderScheda();
                if (typeof showToast === 'function') showToast('Super Serie aggiunta!', 'success');
            } catch (e) {
                console.error('[Allenamento] add superset error:', e);
                if (typeof showToast === 'function') showToast('Errore aggiunta super serie', 'error');
            }
        }
