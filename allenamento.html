        // Minimal QR code generator (alphanumeric, works for URLs)
        function _generateQR(canvas, data) {
            // Use a lightweight approach: render via an img from a data URL QR library
            // We use the QR encoding directly on canvas
            const size = 220;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Load QRCode library dynamically if not cached
            if (window._qrLib) {
                _drawQRToCanvas(canvas, data, size);
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
            script.onload = () => {
                window._qrLib = true;
                _drawQRToCanvas(canvas, data, size);
            };
            script.onerror = () => {
                // Fallback: show the URL as text
                ctx.fillStyle = '#f1f5f9';
                ctx.fillRect(0, 0, size, size);
                ctx.fillStyle = '#64748b';
                ctx.font = '12px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('QR non disponibile', size/2, size/2 - 8);
                ctx.fillText('Copia il link qui sotto', size/2, size/2 + 12);
            };
            document.head.appendChild(script);
        }

        function _drawQRToCanvas(canvas, data, size) {
            const qr = qrcode(0, 'M');
            qr.addData(data);
            qr.make();
            const modules = qr.getModuleCount();
            const cellSize = size / modules;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#0f172a';
            for (let r = 0; r < modules; r++) {
                for (let c = 0; c < modules; c++) {
                    if (qr.isDark(r, c)) {
                        ctx.fillRect(c * cellSize, r * cellSize, cellSize + 0.5, cellSize + 0.5);
                    }
                }
            }
        }

        // ── PDF Generation ───────────────────────────────────────────
        function _loadPdfScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src; s.onload = resolve;
                s.onerror = () => reject(new Error('Script non caricato: ' + src));
                document.head.appendChild(s);
            });
        }

        async function _ensureJsPDF() {
            if (window.jspdf && window.jspdf.jsPDF) return;
            await _loadPdfScript('https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js');
            await _loadPdfScript('https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js');
        }

        const _IMG_PROXY = 'https://ppymuuyoveyyoswcimck.supabase.co/functions/v1/image-proxy?url=';

        async function _imgToBase64(url) {
            if (!url) return null;
            // Proxy via Supabase Edge Function (adds CORS headers)
            try {
                const proxyUrl = _IMG_PROXY + encodeURIComponent(url);
                const resp = await fetch(proxyUrl);
                if (resp.ok) {
                    const blob = await resp.blob();
                    // Get real dimensions via ImageBitmap
                    const bmp = await createImageBitmap(blob);
                    const ratio = bmp.height / bmp.width;
                    bmp.close();
                    const data = await new Promise(resolve => {
                        const r = new FileReader();
                        r.onload = () => resolve(r.result);
                        r.onerror = () => resolve(null);
                        r.readAsDataURL(blob);
                    });
                    return data ? { data, ratio } : null;
                }
            } catch (e) { /* proxy non disponibile, skip */ }
            return null;
        }

        async function _downloadSchedaPDF() {
            if (!_allPlan) {
                if (typeof showToast === 'function') showToast('Nessuna scheda disponibile', 'error');
                return;
            }
            const btn = document.getElementById('pdfDownloadBtn');
            const origHTML = btn ? btn.innerHTML : '';
            if (btn) { btn.disabled = true; btn.innerHTML = 'Caricamento immagini\u2026'; }

            try {
                await _ensureJsPDF();
                const { jsPDF } = window.jspdf;

                // Pre-load exercise images
                const exercises = _allPlan.workout_exercises || [];
                const imgCache = {};
                await Promise.all(exercises.map(async ex => {
                    const db = _findEx(ex.exercise_name);
                    if (db && db.immagine_url_small) {
                        const b64 = await _imgToBase64(db.immagine_url_small);
                        if (b64) imgCache[ex.exercise_name] = b64;
                    }
                }));

                if (btn) btn.innerHTML = 'Generazione PDF\u2026';

                const doc = new jsPDF('p', 'mm', 'a4');
                const pw = 210, ph = 297, m = 14, cw = pw - m * 2;
                let y = m;
                const CYAN = [0, 174, 239], NAVY = [15, 23, 42], GRAY = [100, 116, 139];
                const LGRAY = [226, 232, 240], WHITE = [255, 255, 255];

                // ── Header ──
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(20);
                doc.setTextColor(...NAVY);
                doc.text(_allPlan.name || 'Scheda Allenamento', m, y + 7);
                y += 12;

                const user = getCurrentUser();
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...GRAY);
                if (user && user.name) doc.text(user.name, m, y + 4);
                doc.text('Data: ____/____/________', pw - m, y + 4, { align: 'right' });
                y += 9;

                doc.setDrawColor(...CYAN);
                doc.setLineWidth(1);
                doc.line(m, y, pw - m, y);
                y += 6;

                if (_allPlan.notes) {
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'italic');
                    doc.setTextColor(...GRAY);
                    const nl = doc.splitTextToSize(_allPlan.notes, cw);
                    doc.text(nl, m, y);
                    y += nl.length * 4 + 4;
                }

                // ── Days ──
                const dayMin = {};
                for (const e of exercises) {
                    if (!(e.day_label in dayMin) || e.sort_order < dayMin[e.day_label])
                        dayMin[e.day_label] = e.sort_order;
                }
                const days = [...new Set(exercises.map(e => e.day_label))].sort((a, b) => dayMin[a] - dayMin[b]);

                for (const day of days) {
                    const dayEx = exercises.filter(e => e.day_label === day).sort((a, b) => a.sort_order - b.sort_order);
                    if (y > ph - 50) { doc.addPage(); y = m; }

                    // Day header bar
                    doc.setFillColor(...CYAN);
                    doc.roundedRect(m, y, cw, 10, 2, 2, 'F');
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(13);
                    doc.setTextColor(...WHITE);
                    doc.text(day.toUpperCase(), m + 5, y + 7);
                    y += 12;

                    // Build superset groups map
                    const ssMap = {}, ssRendered = new Set();
                    for (const e of dayEx) {
                        if (e.superset_group) {
                            if (!ssMap[e.superset_group]) ssMap[e.superset_group] = [];
                            ssMap[e.superset_group].push(e);
                        }
                    }

                    // Misura altezza approssimata di un esercizio (immagine+titolo+note+tabella)
                    // Serve per fare il page-break PRIMA del divider, così numero+immagine
                    // restano sempre sulla stessa pagina. Il caller garantisce lo spazio,
                    // quindi _pdfExBlock non fa più page-break interni.
                    function _measureExBlock(ex, indent) {
                        const isCardio = (ex.muscle_group || '').toLowerCase() === 'cardio';
                        const imgObj = imgCache[ex.exercise_name];
                        const sets = isCardio ? 1 : (ex.sets || 3);
                        const imgW = 16;
                        const imgH = imgObj ? imgW * imgObj.ratio : 16;
                        let noteH = 0;
                        if (ex.notes) {
                            const tx = (imgObj ? imgW + 3 : 0);
                            doc.setFont('helvetica', 'italic'); doc.setFontSize(8);
                            noteH = doc.splitTextToSize(ex.notes, cw - indent - tx).length * 3.5;
                        }
                        const topH = Math.max(imgObj ? imgH + 2 : 16, 16 + noteH);
                        const tableH = isCardio ? 14 : ((sets + 2) * 7 + 1);
                        return topH + tableH + 3;
                    }

                    // Altezza del prossimo divider. Il separatore viene disegnato solo
                    // se non siamo a inizio pagina e se c'è già almeno un esercizio sopra.
                    function _dividerH() {
                        return (exNum >= 1 && y > m + 0.5 ? 4 : 0) + 10;
                    }

                    function _measureSuperset(pair) {
                        let h = _dividerH() + 3 + 11;
                        pair.forEach((e, idx) => {
                            if (idx > 0) h += 3;
                            h += 4;
                            h += _measureExBlock(e, 4);
                        });
                        return h + 2;
                    }

                    // Helper: render one exercise block (image + name + table)
                    function _pdfExBlock(ex, indent) {
                        const isCardio = (ex.muscle_group || '').toLowerCase() === 'cardio';
                        const imgObj = imgCache[ex.exercise_name]; // { data, ratio } or null
                        const sets = isCardio ? 1 : (ex.sets || 3);

                        const lx = m + indent;
                        const imgW = 16;
                        const imgH = imgObj ? imgW * imgObj.ratio : imgW;
                        let tx = lx;
                        if (imgObj) {
                            try { doc.addImage(imgObj.data, 'PNG', lx, y, imgW, imgH); tx = lx + imgW + 3; } catch (e) { /* skip */ }
                        }
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(11);
                        doc.setTextColor(...NAVY);
                        doc.text(ex.exercise_name, tx, y + 5);

                        const restUnit = ex.rest_seconds && ex.rest_seconds <= 3 ? ' min' : 's';
                        const target = isCardio
                            ? ex.reps + ' min'
                            : (ex.sets || '') + ' \u00d7 ' + (ex.reps || '') + (ex.weight_kg != null ? ' @ ' + ex.weight_kg + ' kg' : '') + (ex.rest_seconds ? ' \u00b7 ' + ex.rest_seconds + restUnit + ' pausa' : '');
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(9);
                        doc.setTextColor(...GRAY);
                        doc.text(target, tx, y + 10);
                        if (ex.muscle_group) { doc.setFontSize(8); doc.text(ex.muscle_group, tx, y + 14); }

                        let noteH = 0;
                        if (ex.notes) {
                            doc.setFont('helvetica', 'italic');
                            doc.setFontSize(8);
                            const nl = doc.splitTextToSize(ex.notes, cw - indent - (tx - lx));
                            doc.text(nl, tx, y + 18);
                            noteH = nl.length * 3.5;
                        }
                        y += Math.max(imgObj ? imgH + 2 : 16, 16 + noteH);

                        const tblLeft = m + indent;
                        const tblW = cw - indent;
                        if (isCardio) {
                            doc.autoTable({
                                startY: y, head: [['Minuti', 'Fatto \u2713']],
                                body: [[(ex.reps || '') + ' min', '']],
                                margin: { left: tblLeft, right: m }, tableWidth: tblW,
                                styles: { fontSize: 9, cellPadding: 2, lineColor: LGRAY, lineWidth: 0.3, minCellHeight: 6 },
                                headStyles: { fillColor: NAVY, textColor: WHITE, fontStyle: 'bold', fontSize: 8, halign: 'center' },
                                bodyStyles: { halign: 'center' }, theme: 'grid'
                            });
                        } else {
                            const body = [];
                            for (let s = 1; s <= sets; s++) {
                                body.push([s.toString(), (ex.reps || '').toString(),
                                    ex.weight_kg != null ? ex.weight_kg.toString() : '',
                                    ex.rest_seconds ? ex.rest_seconds + restUnit : '', '']);
                            }
                            body.push(['', '', '', '', '']);
                            doc.autoTable({
                                startY: y, head: [['Serie', 'Reps', 'Kg', 'Riposo', 'Fatto \u2713']],
                                body: body, margin: { left: tblLeft, right: m }, tableWidth: tblW,
                                styles: { fontSize: 9, cellPadding: 2, lineColor: LGRAY, lineWidth: 0.3, minCellHeight: 7 },
                                headStyles: { fillColor: NAVY, textColor: WHITE, fontStyle: 'bold', fontSize: 8, halign: 'center' },
                                bodyStyles: { halign: 'center' },
                                alternateRowStyles: { fillColor: [248, 250, 252] },
                                columnStyles: { 0: { cellWidth: 18 }, 1: { cellWidth: 28 }, 2: { cellWidth: 28 }, 3: { cellWidth: 32 } },
                                theme: 'grid'
                            });
                        }
                        y = (doc.lastAutoTable ? doc.lastAutoTable.finalY : y + 30) + 3;
                    }

                    // Numbered divider between exercises
                    let exNum = 0;
                    function _pdfDivider() {
                        exNum++;
                        // Separatore solo se non siamo a inizio pagina (dopo page-break
                        // y === m, il separatore in cima alla pagina non ha senso)
                        if (exNum > 1 && y > m + 0.5) {
                            doc.setDrawColor(...LGRAY);
                            doc.setLineWidth(0.5);
                            doc.line(m, y, pw - m, y);
                            y += 4;
                        }
                        // Number badge
                        const r = 4.5;
                        doc.setFillColor(...CYAN);
                        doc.circle(m + r, y + r, r, 'F');
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(9);
                        doc.setTextColor(...WHITE);
                        doc.text(exNum.toString(), m + r, y + r + 1, { align: 'center' });
                        y += r * 2 + 1;
                    }

                    for (const ex of dayEx) {
                        // ── Superset block ──
                        if (ex.superset_group && !ssRendered.has(ex.superset_group)) {
                            ssRendered.add(ex.superset_group);
                            const pair = ssMap[ex.superset_group] || [ex];
                            const ex1 = pair[0], ex2 = pair[1];
                            // Pre-check: tutto il superset deve stare sulla stessa pagina
                            const ssH = _measureSuperset(pair);
                            if (y + ssH > ph - m - 10 && y > m) { doc.addPage(); y = m; }

                            _pdfDivider();

                            // SS accent bar
                            doc.setFillColor(...CYAN);
                            doc.roundedRect(m, y, cw, 0.8, 0, 0, 'F');
                            y += 3;
                            doc.setFont('helvetica', 'bold');
                            doc.setFontSize(10);
                            doc.setTextColor(...CYAN);
                            doc.text('SUPER SERIE', m, y + 4);
                            doc.setFontSize(9);
                            doc.setTextColor(...NAVY);
                            doc.text(pair.map(e => e.exercise_name).join('  +  '), m + 30, y + 4);
                            const t1 = (ex1.sets||'') + '\u00d7' + (ex1.reps||'') + (ex1.weight_kg != null ? ' @' + ex1.weight_kg + 'kg' : '');
                            const t2 = ex2 ? (ex2.sets||'') + '\u00d7' + (ex2.reps||'') + (ex2.weight_kg != null ? ' @' + ex2.weight_kg + 'kg' : '') : '';
                            const ssRest = ex2 && ex2.rest_seconds ? ' \u00b7 ' + ex2.rest_seconds + 's pausa' : '';
                            doc.setFont('helvetica', 'normal');
                            doc.setFontSize(8);
                            doc.setTextColor(...GRAY);
                            doc.text(t1 + (t2 ? ' + ' + t2 : '') + ssRest, m, y + 9);
                            y += 11;

                            pair.forEach((ssEx, idx) => {
                                if (idx > 0) {
                                    // Dashed separator between SS exercises
                                    doc.setDrawColor(...CYAN);
                                    doc.setLineWidth(0.3);
                                    doc.setLineDashPattern([2, 2], 0);
                                    doc.line(m + 4, y, pw - m, y);
                                    doc.setLineDashPattern([], 0);
                                    y += 3;
                                }
                                doc.setFont('helvetica', 'bold');
                                doc.setFontSize(8);
                                doc.setTextColor(...CYAN);
                                doc.text(String.fromCharCode(65 + idx) + '.', m + 4, y + 3);
                                y += 4;
                                _pdfExBlock(ssEx, 4);
                            });
                            y += 2;
                            continue;
                        }
                        if (ex.superset_group && ssRendered.has(ex.superset_group)) continue;

                        // ── Normal single exercise ──
                        // Pre-check: numero + immagine + tabella devono stare insieme
                        const needH = _dividerH() + _measureExBlock(ex, 0);
                        if (y + needH > ph - m - 10 && y > m) { doc.addPage(); y = m; }
                        _pdfDivider();
                        _pdfExBlock(ex, 0);
                    }
                    y += 4;
                }

                // Footer on each page
                const tp = doc.internal.getNumberOfPages();
                for (let i = 1; i <= tp; i++) {
                    doc.setPage(i);
                    doc.setFontSize(7);
                    doc.setFont('helvetica', 'normal');
                    doc.setTextColor(...GRAY);
                    doc.text('Thomas Bresciani Personal Trainer', m, ph - 8);
                    doc.text(i + ' / ' + tp, pw - m, ph - 8, { align: 'right' });
                }

                const fname = 'scheda-' + (_allPlan.name || 'allenamento').replace(/[^a-zA-Z0-9]+/g, '-').toLowerCase() + '.pdf';
                doc.save(fname);
                if (typeof showToast === 'function') showToast('PDF scaricato!', 'success');
            } catch (e) {
                console.error('[PDF] Errore:', e);
                if (typeof showToast === 'function') showToast('Errore PDF: ' + (e.message || ''), 'error');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
            }
        }

        function _downloadTabletQR() {
            const canvas = document.getElementById('tabletQrCanvas');
            if (!canvas) return;
            const a = document.createElement('a');
            a.download = 'qr-allenamento.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        }

        function _copyTabletLink() {
            const user = getCurrentUser();
            if (!user) return;
            const link = window.location.origin + '/tablet.html?uid=' + user.id;
            navigator.clipboard.writeText(link).then(() => {
                if (typeof showToast === 'function') showToast('Link copiato!', 'success');
            }).catch(() => {
                prompt('Copia questo link:', link);
            });
        }
    </script>
    <script src="js/allenamento-report.js?v=1"></script>
    <script src="js/sw-update.js"></script>
    <script src="js/pwa-install.js"></script>
</body>
