    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.1/dist/umd/supabase.min.js" integrity="sha384-nBSomYN4UWX4we7Pw5GsQDkjtwLh2Wde+3szWl5Lzf0zuN9XncHIZLNoucos4C7f" crossorigin="anonymous"></script>
    <script src="js/supabase-client.js?v=1"></script>

    <!-- chart-mini.js non serve: usa drawDarkLineChart() interno -->
    <script>
        let _allView = 'scheda';
        let _allPlan = null;
        let _allPlans = [];  // tutte le schede (attive e vecchie)
        let _allLogs = [];
        let _activeDay = null;  // giorno selezionato (session picker)
        let _filterPeriod = 'all';
        let _filterMuscle = 'all';

        // ── Exercise catalog (shared with admin-schede) ──────────────────
        let _allExDB = [];
        let _allExDBLoaded = false;
        async function _loadAllExDB() {
            if (_allExDBLoaded) return;
            try {
                const r = await fetch('Top 200 Esercizi/esercizi_metadata.json');
                _allExDB = await r.json();
                _allExDBLoaded = true;
            } catch (e) { console.warn('[Allenamento] exercise DB load failed:', e); }
        }
        function _findEx(name) { return _allExDB.find(e => e.nome_it === name) || null; }

        function showExDetail(slug) {
            const ex = _allExDB.find(e => e.slug === slug);
            if (!ex) return;
            const old = document.getElementById('exDetailOverlay');
            if (old) old.remove();

            const overlay = document.createElement('div');
            overlay.id = 'exDetailOverlay';
            overlay.className = 'schede-ex-detail-overlay';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
            overlay.innerHTML = `
            <div class="schede-ex-detail-panel">
                <div class="schede-ex-detail-header">
                    <div>
                        <h3>${_escHtml(ex.nome_it)}</h3>
                        <span class="schede-ex-detail-cat">${_escHtml(ex.categoria)}</span>
                        <span class="schede-ex-detail-en">${_escHtml(ex.nome_en)}</span>
                    </div>
                    <button class="schede-ex-detail-close" onclick="document.getElementById('exDetailOverlay').remove()">&times;</button>
                </div>
                <div class="schede-ex-detail-body">
                    <div class="schede-ex-detail-media" id="exDetailMedia"></div>
                </div>
            </div>`;
            document.body.appendChild(overlay);

            const mc = document.getElementById('exDetailMedia');
            if (ex.video_url && mc) {
                const v = document.createElement('video');
                v.className = 'schede-ex-detail-video';
                v.controls = true; v.autoplay = true; v.loop = true;
                v.muted = true; v.playsInline = true; v.preload = 'auto';
                v.src = ex.video_url;
                mc.appendChild(v);
                v.load(); v.play().catch(() => {});
            } else if (mc) {
                const img = document.createElement('img');
                img.className = 'schede-ex-detail-img';
                img.src = ex.immagine_url_small; img.alt = ex.nome_it;
                mc.appendChild(img);
            }
            requestAnimationFrame(() => overlay.classList.add('visible'));
        }

        function switchAllView(view) {
            _allView = view;
            const pillScheda = document.getElementById('pillScheda');
            const pillProgressi = document.getElementById('pillProgressi');
            pillScheda.classList.toggle('active', view === 'scheda');
            pillProgressi.classList.toggle('active', view === 'progressi');
            pillScheda.setAttribute('aria-selected', view === 'scheda');
            pillProgressi.setAttribute('aria-selected', view === 'progressi');
            if (view === 'scheda') renderScheda();
            else renderProgressi();
        }

        // ── Gating ────────────────────────────────────────────────────────
        const ALLENAMENTO_ALLOWED_UID = 'cf5f39f3-1581-40be-80e9-15b56acee337';

        // ── Init ──────────────────────────────────────────────────────────
        (async function() {
            await initAuth();
            const user = getCurrentUser();

            // Redirect non-allowed users
            if (!user || user.id !== ALLENAMENTO_ALLOWED_UID) {
                window.location.replace('/');
                return;
            }

            try {
                await _loadAllExDB();

                // Fetch ALL plans (active + old)
                const { data: plans, error } = await supabaseClient
                    .from('workout_plans')
                    .select('*, workout_exercises(*)')
                    .eq('user_id', user.id)
                    .order('active', { ascending: false })
                    .order('updated_at', { ascending: false });

                if (error) throw error;
                if (!plans?.length) {
                    document.getElementById('allContent').innerHTML =
                        '<div class="all-empty">Nessuna scheda assegnata dal trainer.<br>Contattalo per riceverne una!</div>';
                    return;
                }

                // Sort exercises within each plan
                for (const p of plans) {
                    p.workout_exercises = (p.workout_exercises || []).sort((a, b) => a.sort_order - b.sort_order);
                }

                _allPlans = plans;
                _allPlan = plans.find(p => p.active) || plans[0];

                // Build plan selector if multiple plans
                _renderPlanSelector();

                // Fetch logs for current plan
                await _loadLogsForPlan(_allPlan);

                renderScheda();
            } catch (e) {
                console.error('[Allenamento] init error:', e);
                document.getElementById('allContent').innerHTML = '<div class="all-empty">Errore caricamento scheda.</div>';
            }
        })();

        // ── Plan selector ─────────────────────────────────────────────────
        function _renderPlanSelector() {
            if (_allPlans.length <= 1) return;
            const nav = document.querySelector('.all-nav');
            if (!nav) return;
            // Insert selector before the nav pills
            const existing = document.getElementById('allPlanSelector');
            if (existing) existing.remove();
            const sel = document.createElement('div');
            sel.id = 'allPlanSelector';
            sel.className = 'all-plan-selector';
            sel.innerHTML = `<select onchange="switchPlan(this.value)">
                ${_allPlans.map(p => {
                    const label = _escHtml(p.name) + (p.active ? ' (attiva)' : '');
                    return `<option value="${p.id}" ${p.id === _allPlan.id ? 'selected' : ''}>${label}</option>`;
                }).join('')}
            </select>`;
            nav.parentNode.insertBefore(sel, nav);
        }

        async function switchPlan(planId) {
            const plan = _allPlans.find(p => p.id === planId);
            if (!plan) return;
            _allPlan = plan;
            document.getElementById('allContent').innerHTML = '<div class="all-loading">Caricamento...</div>';
            await _loadLogsForPlan(plan);
            if (_allView === 'scheda') renderScheda();
            else renderProgressi();
        }

        async function _loadLogsForPlan(plan) {
            const user = getCurrentUser();
            if (!user) return;
            const exIds = (plan.workout_exercises || []).map(e => e.id);
            if (exIds.length) {
                const { data: logsData } = await supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .in('exercise_id', exIds)
                    .eq('user_id', user.id)
                    .order('log_date', { ascending: false })
                    .order('set_number', { ascending: true });
                _allLogs = logsData || [];
            } else {
                _allLogs = [];
            }
        }

        // ── Helpers: last-done per day, previous session per exercise ──
        function _dayLastDone(dayLabel) {
            // Trova la data più recente in cui è stato loggato qualcosa per un esercizio di questo giorno
            const dayExIds = new Set(
                (_allPlan?.workout_exercises || []).filter(e => e.day_label === dayLabel).map(e => e.id)
            );
            let latest = null;
            for (const l of _allLogs) {
                if (dayExIds.has(l.exercise_id) && (!latest || l.log_date > latest)) latest = l.log_date;
            }
            return latest;
        }

        function _dayDoneToday(dayLabel) {
            const today = _localDateStr();
            const dayExIds = new Set(
                (_allPlan?.workout_exercises || []).filter(e => e.day_label === dayLabel).map(e => e.id)
            );
            // Considerato fatto se almeno 1 esercizio ha log oggi
            return _allLogs.some(l => l.exercise_id && dayExIds.has(l.exercise_id) && l.log_date === today);
        }

        function _prevSessionLogs(exerciseId) {
            // Restituisce i log della sessione precedente (non oggi) per questo esercizio
            const today = _localDateStr();
            const prevLogs = _allLogs.filter(l => l.exercise_id === exerciseId && l.log_date < today);
            if (!prevLogs.length) return [];
            // Prendi la data più recente
            const latestDate = prevLogs.reduce((max, l) => l.log_date > max ? l.log_date : max, prevLogs[0].log_date);
            return prevLogs.filter(l => l.log_date === latestDate).sort((a, b) => a.set_number - b.set_number);
        }

        function _suggestDay(days) {
            // Suggerisci il giorno fatto più tempo fa, o mai fatto
            let best = null;
            let bestDate = 'zzzz'; // sempre dopo qualsiasi data
            for (const day of days) {
                const last = _dayLastDone(day);
                if (!last) return day; // mai fatto → suggerisci subito
                if (last < bestDate) { bestDate = last; best = day; }
            }
            return best || days[0];
        }

        function switchDay(dayLabel) {
            _activeDay = dayLabel;
            renderScheda();
        }

        // ── Render Scheda ─────────────────────────────────────────────────
        function renderScheda() {
            const container = document.getElementById('allContent');
            if (!_allPlan) return;

            const exercises = _allPlan.workout_exercises;
            const days = [...new Set(exercises.map(e => e.day_label))];
            const today = _localDateStr();
            const todayLogs = _allLogs.filter(l => l.log_date === today);

            // Auto-select day
            if (!_activeDay || !days.includes(_activeDay)) _activeDay = _suggestDay(days);

            let html = '';

            // Plan info card (compact)
            html += `<div class="all-plan-card">
                <div class="all-plan-name">${_escHtml(_allPlan.name)}</div>
                ${_allPlan.notes ? `<div class="all-plan-notes">${_escHtml(_allPlan.notes)}</div>` : ''}
                <div class="all-plan-meta">
                    ${exercises.length} esercizi &middot; ${days.length} ${days.length === 1 ? 'giorno' : 'giorni'}
                    ${_allPlan.start_date ? ' &middot; dal ' + _fmtDateAll(_allPlan.start_date) : ''}
                </div>
            </div>`;

            // ── Day selector tabs ────────────────────────────────────────
            html += '<div class="all-day-tabs" role="tablist" aria-label="Giorni di allenamento">';
            for (const day of days) {
                const isActive = day === _activeDay;
                const doneToday = _dayDoneToday(day);
                const lastDone = _dayLastDone(day);
                const lastStr = doneToday ? 'oggi' : lastDone ? _fmtDateAll(lastDone) : 'mai';

                html += `<button class="all-day-tab ${isActive ? 'active' : ''} ${doneToday ? 'done' : ''}" role="tab" aria-selected="${isActive}" aria-label="${_escHtml(day)}${doneToday ? ', completato' : ''}" onclick="switchDay('${_escHtml(day)}')">
                    <span class="all-day-tab-name">${_escHtml(day)}${doneToday ? ' &#10003;' : ''}</span>
                    <span class="all-day-tab-last">ultimo: ${lastStr}</span>
                </button>`;
            }
            html += '</div>';

            // ── Exercises for selected day only ──────────────────────────
            const dayExercises = exercises.filter(e => e.day_label === _activeDay);
            const dayDoneCount = dayExercises.filter(ex => todayLogs.some(l => l.exercise_id === ex.id)).length;

            html += `<div class="all-day">
                <div class="all-day-header">
                    <span class="all-day-label">${_escHtml(_activeDay)}</span>
                    <span class="all-day-count">${dayDoneCount}/${dayExercises.length} completati</span>
                </div>`;

            for (const ex of dayExercises) {
                const target = `${ex.sets} × ${ex.reps}${ex.weight_kg != null ? ' @ ' + ex.weight_kg + ' kg' : ''}`;
                const hasLogs = todayLogs.some(l => l.exercise_id === ex.id);
                const prevLogs = _prevSessionLogs(ex.id);

                const dbEx = _findEx(ex.exercise_name);
                const thumbSrc = dbEx ? dbEx.immagine_url_small : '';
                const exSlug = dbEx ? dbEx.slug : '';

                html += `<div class="all-ex-card ${hasLogs ? 'all-ex-done' : ''}" id="ex-${ex.id}">
                    <div class="all-ex-header" onclick="toggleExCard('${ex.id}')">
                        ${thumbSrc ? `<img src="${thumbSrc}" class="all-ex-thumb" alt="" loading="lazy" onclick="event.stopPropagation();showExDetail('${_escHtml(exSlug)}')">` : ''}
                        <div class="all-ex-info">
                            <div class="all-ex-name">${_escHtml(ex.exercise_name)}${exSlug ? `<button class="all-ex-info-btn" onclick="event.stopPropagation();showExDetail('${_escHtml(exSlug)}')" title="Info esercizio">&#9432;</button>` : ''}</div>
                            <div class="all-ex-target">${target}${ex.rest_seconds ? ' &middot; rec. ' + ex.rest_seconds + 's' : ''}</div>
                        </div>
                        <div class="all-ex-status">${hasLogs ? '<span class="all-ex-check">&#10003;</span>' : '<span class="all-ex-chevron">&#9662;</span>'}</div>
                    </div>
                    <div class="all-ex-body">
                        ${ex.notes ? `<div class="all-ex-note">${_escHtml(ex.notes)}</div>` : ''}`;

                // Previous session reference
                if (prevLogs.length) {
                    const prevDate = prevLogs[0].log_date;
                    html += `<div class="all-prev-session">
                        <span class="all-prev-label">Sessione precedente — ${_fmtDateAll(prevDate)}</span>
                        <div class="all-prev-sets">`;
                    for (const pl of prevLogs) {
                        html += `<span class="all-prev-set">${pl.set_number}. ${pl.reps_done || '—'}×${pl.weight_done != null ? pl.weight_done + 'kg' : '—'}${pl.rpe ? ' RPE ' + pl.rpe : ''}</span>`;
                    }
                    html += `</div></div>`;
                }

                html += `<div class="all-log-section" data-ex-id="${ex.id}">
                            <div class="all-log-header">Registra per oggi — ${_fmtDateAll(today)}</div>
                            <div class="all-log-grid">
                                <div class="all-log-grid-header">
                                    <span>Serie</span><span>Reps</span><span>Kg</span><span>RPE</span>
                                </div>`;

                // Calcola il numero totale di righe: max tra serie previste, log di oggi e log precedenti
                const todayMaxSet = todayLogs.filter(l => l.exercise_id === ex.id).reduce((m, l) => Math.max(m, l.set_number), 0);
                const prevMaxSet = prevLogs.reduce((m, l) => Math.max(m, l.set_number), 0);
                const totalRows = Math.max(ex.sets, todayMaxSet, prevMaxSet);

                for (let s = 1; s <= totalRows; s++) {
                    const existing = todayLogs.find(l => l.exercise_id === ex.id && l.set_number === s);
                    const prev = prevLogs.find(l => l.set_number === s);
                    const isExtra = s > ex.sets;
                    // Priorità: log di oggi → valori sessione precedente → default scheda (solo per serie base)
                    const rVal = existing?.reps_done ?? prev?.reps_done ?? (isExtra ? '' : (parseInt(ex.reps) || ''));
                    const wVal = existing?.weight_done ?? prev?.weight_done ?? (isExtra ? '' : (ex.weight_kg ?? ''));
                    const rpeVal = existing?.rpe ?? '';
                    html += `<div class="all-log-row">
                        <span class="all-log-set">${s}</span>
                        <input type="number" inputmode="numeric" min="0" value="${rVal}" class="all-log-input" data-field="reps" data-set="${s}" aria-label="Ripetizioni serie ${s}">
                        <input type="number" inputmode="decimal" min="0" step="0.5" value="${wVal}" class="all-log-input" data-field="weight" data-set="${s}" aria-label="Peso serie ${s}">
                        <input type="number" inputmode="numeric" min="1" max="10" value="${rpeVal}" class="all-log-input all-log-input--sm" data-field="rpe" data-set="${s}" placeholder="—" aria-label="RPE serie ${s}">
                    </div>`;
                }

                html += `</div>
                            <button class="all-log-add-set" onclick="addExtraSet('${ex.id}', this)">+ Serie</button>
                            <div class="all-log-actions">
                                <button class="all-log-save" onclick="saveLog('${ex.id}', this)">Salva</button>
                                ${hasLogs ? `<button class="all-log-delete" onclick="deleteTodayLog('${ex.id}', this)">Elimina log di oggi</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            }
            html += '</div>';

            container.innerHTML = html;
        }

        function toggleExCard(exId) {
            const card = document.getElementById('ex-' + exId);
            if (card) card.classList.toggle('open');
        }

        async function saveLog(exerciseId, btn) {
            const user = getCurrentUser();
            if (!user) return;
            const section = btn.closest('.all-log-section');
            const rows = section.querySelectorAll('.all-log-row');
            const today = _localDateStr();
            btn.disabled = true;
            btn.textContent = 'Salvataggio...';
            try {
                for (const row of rows) {
                    const s = parseInt(row.querySelector('.all-log-set').textContent);
                    const reps = row.querySelector('input[data-field="reps"]');
                    const weight = row.querySelector('input[data-field="weight"]');
                    const rpe = row.querySelector('input[data-field="rpe"]');
                    await WorkoutLogStorage.logSet({
                        exercise_id: exerciseId,
                        user_id: user.id,
                        log_date: today,
                        set_number: s,
                        reps_done: reps.value ? parseInt(reps.value) : null,
                        weight_done: weight.value ? parseFloat(weight.value) : null,
                        rpe: rpe.value ? parseInt(rpe.value) : null,
                    });
                }
                // Update local logs
                const { data } = await supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .eq('exercise_id', exerciseId)
                    .eq('user_id', user.id)
                    .eq('log_date', today);
                if (data) {
                    _allLogs = _allLogs.filter(l => !(l.exercise_id === exerciseId && l.log_date === today));
                    _allLogs.push(...data);
                }
                // Update UI: checkmark + done state
                const card = document.getElementById('ex-' + exerciseId);
                if (card) {
                    card.classList.add('all-ex-done');
                    const statusEl = card.querySelector('.all-ex-status');
                    if (statusEl) statusEl.innerHTML = '<span class="all-ex-check">&#10003;</span>';
                    // Show delete button if not present
                    const actions = card.querySelector('.all-log-actions');
                    if (actions && !actions.querySelector('.all-log-delete')) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'all-log-delete';
                        delBtn.textContent = 'Elimina log di oggi';
                        delBtn.onclick = function() { deleteTodayLog(exerciseId, delBtn); };
                        actions.appendChild(delBtn);
                    }
                }
                // Update day done count
                const dayExercises = (_allPlan?.workout_exercises || []).filter(e => e.day_label === _activeDay);
                const todayLogs = _allLogs.filter(l => l.log_date === today);
                const doneCount = dayExercises.filter(ex => todayLogs.some(l => l.exercise_id === ex.id)).length;
                const countEl = document.querySelector('.all-day-count');
                if (countEl) countEl.textContent = `${doneCount}/${dayExercises.length} completati`;
                // Update day tab
                const dayTabs = document.querySelectorAll('.all-day-tab');
                dayTabs.forEach(tab => {
                    if (tab.querySelector('.all-day-tab-name')?.textContent.replace(' ✓', '').trim() === _activeDay) {
                        if (!tab.classList.contains('done')) {
                            tab.classList.add('done');
                            const nameEl = tab.querySelector('.all-day-tab-name');
                            if (nameEl && !nameEl.textContent.includes('✓')) nameEl.innerHTML += ' &#10003;';
                            const lastEl = tab.querySelector('.all-day-tab-last');
                            if (lastEl) lastEl.textContent = 'ultimo: oggi';
                        }
                    }
                });

                if (typeof showToast === 'function') showToast('Log salvato', 'success');
                btn.textContent = 'Salvato!';
                btn.classList.add('all-log-save--done');
                setTimeout(() => { btn.textContent = 'Salva'; btn.disabled = false; btn.classList.remove('all-log-save--done'); }, 2000);
            } catch (e) {
                console.error('[Allenamento] log error:', e);
                btn.textContent = 'Salva';
                btn.disabled = false;
                if (typeof showToast === 'function') showToast('Errore salvataggio', 'error');
            }
        }

        function addExtraSet(exerciseId, btn) {
            const section = btn.closest('.all-log-section');
            const grid = section.querySelector('.all-log-grid');
            const rows = grid.querySelectorAll('.all-log-row');
            const nextSet = rows.length + 1;
            const row = document.createElement('div');
            row.className = 'all-log-row';
            row.innerHTML = `
                <span class="all-log-set">${nextSet}</span>
                <input type="number" inputmode="numeric" min="0" value="" class="all-log-input" data-field="reps" data-set="${nextSet}" aria-label="Ripetizioni serie ${nextSet}">
                <input type="number" inputmode="decimal" min="0" step="0.5" value="" class="all-log-input" data-field="weight" data-set="${nextSet}" aria-label="Peso serie ${nextSet}">
                <input type="number" inputmode="numeric" min="1" max="10" value="" class="all-log-input all-log-input--sm" data-field="rpe" data-set="${nextSet}" placeholder="—" aria-label="RPE serie ${nextSet}">
            `;
            grid.appendChild(row);
            row.querySelector('input[data-field="reps"]').focus();
        }

        async function deleteTodayLog(exerciseId, btn) {
            if (!confirm('Eliminare il log di oggi per questo esercizio?')) return;
            const user = getCurrentUser();
            if (!user) return;
            const today = _localDateStr();
            btn.disabled = true;
            btn.textContent = 'Eliminazione...';
            try {
                const todayForEx = _allLogs.filter(l => l.exercise_id === exerciseId && l.log_date === today);
                for (const log of todayForEx) {
                    await WorkoutLogStorage.deleteLog(log.id);
                }
                _allLogs = _allLogs.filter(l => !(l.exercise_id === exerciseId && l.log_date === today));
                if (typeof showToast === 'function') showToast('Log eliminato', 'success');
                renderScheda();
            } catch (e) {
                console.error('[Allenamento] delete error:', e);
                btn.disabled = false;
                btn.textContent = 'Elimina log di oggi';
                if (typeof showToast === 'function') showToast('Errore eliminazione', 'error');
            }
        }

        // ── Render Progressi ──────────────────────────────────────────────
        // Raggruppa per NOME esercizio (non per ID), così log dello stesso
        // esercizio da schede/giorni diversi confluiscono in un unico grafico.
        async function renderProgressi() {
            const container = document.getElementById('allContent');
            const user = getCurrentUser();
            if (!user) return;

            container.innerHTML = '<div class="all-loading">Caricamento progressi...</div>';

            try {
                // Fetch ALL user's plans (anche inattivi) per avere tutti gli exercise IDs
                const { data: allPlans } = await supabaseClient
                    .from('workout_plans')
                    .select('id, workout_exercises(id, exercise_name, muscle_group, sets, reps, weight_kg)')
                    .eq('user_id', user.id);

                const allExercises = (allPlans || []).flatMap(p => p.workout_exercises || []);
                const allExIds = allExercises.map(e => e.id);
                if (!allExIds.length) {
                    container.innerHTML = '<div class="all-empty">Nessun esercizio nelle tue schede.</div>';
                    return;
                }

                // Fetch ALL logs for this user's exercises
                const { data: logs } = await supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .in('exercise_id', allExIds)
                    .eq('user_id', user.id)
                    .order('log_date', { ascending: true });

                if (!logs?.length) {
                    container.innerHTML = '<div class="all-empty">Nessun log registrato ancora.<br>Inizia ad allenarti per vedere i progressi!</div>';
                    return;
                }

                // Map exercise_id → { name, muscle_group }
                const idToName = {};
                const idToMuscle = {};
                for (const ex of allExercises) {
                    idToName[ex.id] = ex.exercise_name;
                    idToMuscle[ex.id] = ex.muscle_group || '';
                }

                // Map exercise_name → muscle_group (first found)
                const nameToMuscle = {};
                for (const ex of allExercises) {
                    if (ex.muscle_group && !nameToMuscle[ex.exercise_name]) {
                        nameToMuscle[ex.exercise_name] = ex.muscle_group;
                    }
                }

                // Group logs by exercise NAME
                const logsByName = {};
                for (const l of logs) {
                    const name = idToName[l.exercise_id] || 'Sconosciuto';
                    if (!logsByName[name]) logsByName[name] = [];
                    logsByName[name].push(l);
                }

                // Get current target from active plan (if available)
                const activeExercises = _allPlan?.workout_exercises || [];
                const targetByName = {};
                for (const ex of activeExercises) {
                    targetByName[ex.exercise_name] = { sets: ex.sets, reps: ex.reps, weight_kg: ex.weight_kg };
                }

                // Available muscle groups (from data)
                const muscleGroups = [...new Set(Object.values(nameToMuscle).filter(Boolean))].sort();

                // Read active filters from persistent state
                const filterPeriod = _filterPeriod;
                const filterMuscle = _filterMuscle;

                // Apply time filter to logs
                let filteredLogs = logs;
                if (filterPeriod !== 'all') {
                    const now = new Date();
                    let cutoff;
                    if (filterPeriod === '7d') cutoff = new Date(now.getTime() - 7 * 86400000);
                    else if (filterPeriod === '30d') cutoff = new Date(now.getTime() - 30 * 86400000);
                    else if (filterPeriod === '90d') cutoff = new Date(now.getTime() - 90 * 86400000);
                    if (cutoff) {
                        const cutoffStr = _localDateStr(cutoff);
                        filteredLogs = logs.filter(l => l.log_date >= cutoffStr);
                    }
                }

                // Re-group filtered logs by name
                const filteredByName = {};
                for (const l of filteredLogs) {
                    const name = idToName[l.exercise_id] || 'Sconosciuto';
                    if (!filteredByName[name]) filteredByName[name] = [];
                    filteredByName[name].push(l);
                }

                // Apply muscle filter
                let exerciseNames = Object.keys(filteredByName).sort();
                if (filterMuscle !== 'all') {
                    exerciseNames = exerciseNames.filter(n => nameToMuscle[n] === filterMuscle);
                }

                let html = '';

                // Filters bar
                html += `<div class="all-filters">
                    <select id="filterPeriod" onchange="_filterPeriod=this.value;renderProgressi()">
                        <option value="all" ${filterPeriod === 'all' ? 'selected' : ''}>Tutto</option>
                        <option value="7d" ${filterPeriod === '7d' ? 'selected' : ''}>Ultimi 7 giorni</option>
                        <option value="30d" ${filterPeriod === '30d' ? 'selected' : ''}>Ultimi 30 giorni</option>
                        <option value="90d" ${filterPeriod === '90d' ? 'selected' : ''}>Ultimi 90 giorni</option>
                    </select>
                    <select id="filterMuscle" onchange="_filterMuscle=this.value;renderProgressi()">
                        <option value="all" ${filterMuscle === 'all' ? 'selected' : ''}>Tutti i muscoli</option>
                        ${muscleGroups.map(mg => `<option value="${_escHtml(mg)}" ${filterMuscle === mg ? 'selected' : ''}>${_escHtml(mg)}</option>`).join('')}
                    </select>
                </div>`;

                // Stats overview (filtered)
                // Filter logs for stats based on muscle filter too
                const statsLogs = filterMuscle === 'all' ? filteredLogs
                    : filteredLogs.filter(l => nameToMuscle[idToName[l.exercise_id]] === filterMuscle);
                const totalSessions = new Set(statsLogs.map(l => l.exercise_id + '|' + l.log_date)).size;
                const totalSets = statsLogs.length;
                const totalVolume = statsLogs.reduce((sum, l) => sum + ((l.weight_done || 0) * (l.reps_done || 0)), 0);
                html += `<div class="all-stats-row">
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalSessions}</div>
                        <div class="all-stat-label">Sessioni</div>
                    </div>
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalSets}</div>
                        <div class="all-stat-label">Serie totali</div>
                    </div>
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalVolume >= 1000 ? (totalVolume/1000).toFixed(1) + 't' : totalVolume + 'kg'}</div>
                        <div class="all-stat-label">Volume totale</div>
                    </div>
                </div>`;

                // Per-exercise-NAME progress charts (sorted, filtered)
                let chartIdx = 0;
                if (!exerciseNames.length && (filterMuscle !== 'all' || filterPeriod !== 'all')) {
                    html += '<div class="all-empty">Nessun risultato per i filtri selezionati.</div>';
                }
                for (const exName of exerciseNames) {
                    const exLogs = filteredByName[exName];
                    if (!exLogs?.length) continue;

                    // Raggruppa per (exercise_id, log_date) — max weight per sessione
                    const sessionMap = {};  // key = "exId|date" → { date, weight, dateObj }
                    for (const l of exLogs) {
                        if (l.weight_done == null) continue;
                        const key = l.exercise_id + '|' + l.log_date;
                        if (!sessionMap[key] || l.weight_done > sessionMap[key].weight) {
                            sessionMap[key] = { date: l.log_date, weight: l.weight_done };
                        }
                    }
                    // Ordina per data, poi per peso (se stessa data, mostra entrambi)
                    const sessions = Object.values(sessionMap).sort((a, b) =>
                        a.date.localeCompare(b.date) || a.weight - b.weight
                    );
                    if (!sessions.length) continue;

                    const values = sessions.map(s => s.weight);
                    // Se più sessioni nella stessa data, numera: "31 mar (1)", "31 mar (2)"
                    const dateCounts = {};
                    const labels = sessions.map(s => {
                        const fmt = _fmtDateAll(s.date);
                        dateCounts[s.date] = (dateCounts[s.date] || 0) + 1;
                        return fmt;
                    });
                    // Disambigua label duplicate
                    const dateOccurrences = {};
                    for (let i = 0; i < labels.length; i++) {
                        const d = sessions[i].date;
                        if (dateCounts[d] > 1) {
                            dateOccurrences[d] = (dateOccurrences[d] || 0) + 1;
                            labels[i] += ' (' + dateOccurrences[d] + ')';
                        }
                    }

                    const maxW = Math.max(...values);
                    const lastW = values[values.length - 1];
                    const trend = values.length >= 2 ? lastW - values[0] : 0;
                    const trendSign = trend > 0 ? '+' : '';
                    const trendClass = trend > 0 ? 'all-trend-up' : trend < 0 ? 'all-trend-down' : '';
                    const target = targetByName[exName];
                    const targetStr = target
                        ? `Target: ${target.sets}×${target.reps}${target.weight_kg != null ? ' @ ' + target.weight_kg + 'kg' : ''}`
                        : '';

                    const canvasId = 'pchart-' + (chartIdx++);
                    html += `<div class="all-progress-card">
                        <div class="all-progress-header">
                            <div class="all-progress-name">${_escHtml(exName)}</div>
                            ${targetStr ? `<div class="all-progress-meta">${targetStr}</div>` : ''}
                        </div>
                        <canvas id="${canvasId}" width="320" height="140"></canvas>
                        <div class="all-progress-stats">
                            <span>Max <strong>${maxW}kg</strong></span>
                            <span>Ultimo <strong>${lastW}kg</strong></span>
                            <span class="${trendClass}">Trend <strong>${trendSign}${trend.toFixed(1)}kg</strong></span>
                            <span>${sessions.length} sessioni</span>
                        </div>
                    </div>`;

                    setTimeout(((cid, lbl, val) => () => {
                        const canvas = document.getElementById(cid);
                        if (canvas) drawDarkLineChart(canvas, lbl, val, '#00AEEF');
                    })(canvasId, labels, values), 50);
                }

                // Volume per session chart (filtered)
                const volByDate = {};
                for (const l of statsLogs) {
                    if (l.weight_done != null && l.reps_done != null) {
                        const vol = l.weight_done * l.reps_done;
                        volByDate[l.log_date] = (volByDate[l.log_date] || 0) + vol;
                    }
                }
                const volDates = Object.keys(volByDate).sort();
                if (volDates.length > 1) {
                    const volValues = volDates.map(d => Math.round(volByDate[d]));
                    const volLabels = volDates.map(d => _fmtDateAll(d));
                    const volCanvasId = 'pchart-volume';
                    html += `<div class="all-progress-card all-progress-card--volume">
                        <div class="all-progress-header">
                            <div class="all-progress-name">Volume Totale per Sessione</div>
                        </div>
                        <canvas id="${volCanvasId}" width="320" height="140"></canvas>
                        <div class="all-progress-stats">
                            <span>Max <strong>${Math.max(...volValues)}kg</strong></span>
                            <span>Ultimo <strong>${volValues[volValues.length - 1]}kg</strong></span>
                        </div>
                    </div>`;
                    setTimeout(() => {
                        const canvas = document.getElementById(volCanvasId);
                        if (canvas) drawDarkLineChart(canvas, volLabels, volValues, '#22c55e');
                    }, 50);
                }

                container.innerHTML = html;
            } catch (e) {
                console.error('[Progressi] error:', e);
                container.innerHTML = '<div class="all-empty">Errore caricamento progressi.</div>';
            }
        }

        function _fmtDateAll(iso) {
            if (!iso) return '';
            const d = new Date(iso + 'T00:00:00');
            return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
        }

        // ── Refined line chart (canvas) ──────────────────────────────────
        function drawDarkLineChart(canvas, labels, values, color) {
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const w = rect.width > 0 ? rect.width : 320;
            const h = 150;
            canvas.width = Math.round(w * 2);
            canvas.height = Math.round(h * 2);
            ctx.scale(2, 2);

            // Background
            ctx.fillStyle = '#f8fafc';
            const r = 10;
            ctx.beginPath();
            ctx.moveTo(r, 0); ctx.lineTo(w - r, 0); ctx.quadraticCurveTo(w, 0, w, r);
            ctx.lineTo(w, h - r); ctx.quadraticCurveTo(w, h, w - r, h);
            ctx.lineTo(r, h); ctx.quadraticCurveTo(0, h, 0, h - r);
            ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath();
            ctx.fill();

            const pad = { top: 22, right: 14, bottom: 30, left: 42 };
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;

            if (!values.length) return;
            const minV = Math.min(...values);
            const maxV = Math.max(...values);
            const range = maxV - minV || 1;
            const yMin = Math.max(0, minV - range * 0.1);
            const yMax = maxV + range * 0.1;
            const yRange = yMax - yMin || 1;

            // Grid lines — dashed, subtle
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 0.8;
            ctx.setLineDash([3, 3]);
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + ch - (ch * i / 4);
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
                ctx.fillStyle = '#94a3b8';
                ctx.font = '500 8.5px system-ui, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(Math.round(yMin + yRange * i / 4), pad.left - 6, y + 3);
            }
            ctx.setLineDash([]);

            // Data points
            const pts = values.map((v, i) => ({
                x: pad.left + (values.length === 1 ? cw / 2 : (i / (values.length - 1)) * cw),
                y: pad.top + ch - ((v - yMin) / yRange) * ch,
                v,
            }));

            // Area fill — smooth gradient
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pad.top + ch);
            pts.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
            grad.addColorStop(0, color + '30');
            grad.addColorStop(0.6, color + '10');
            grad.addColorStop(1, color + '02');
            ctx.fillStyle = grad;
            ctx.fill();

            // Line — thicker, rounded
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();

            // Dots
            pts.forEach((p, i) => {
                const isLast = i === pts.length - 1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, isLast ? 4.5 : 3, 0, Math.PI * 2);
                ctx.fillStyle = isLast ? color : '#fff';
                ctx.fill();
                ctx.strokeStyle = isLast ? '#fff' : color;
                ctx.lineWidth = isLast ? 2 : 1.5;
                ctx.stroke();
                if (isLast) {
                    // Glow ring on last point
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
                    ctx.strokeStyle = color + '25';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });

            // X labels
            ctx.fillStyle = '#94a3b8';
            ctx.font = '500 7.5px system-ui, sans-serif';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(labels.length / 6));
            labels.forEach((lbl, i) => {
                if (i % step === 0 || i === labels.length - 1) {
                    ctx.fillText(lbl, pts[i].x, pad.top + ch + 14);
                }
            });

            // Value badge on last point
            const last = pts[pts.length - 1];
            const label = last.v + 'kg';
            ctx.font = 'bold 9.5px system-ui, sans-serif';
            const tw = ctx.measureText(label).width;
            const bx = Math.min(last.x, w - pad.right - tw / 2 - 6);
            const by = last.y - 14;
            // Badge background
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            const br = 4;
            ctx.moveTo(bx - tw/2 - 5 + br, by - 8);
            ctx.lineTo(bx + tw/2 + 5 - br, by - 8);
            ctx.quadraticCurveTo(bx + tw/2 + 5, by - 8, bx + tw/2 + 5, by - 8 + br);
            ctx.lineTo(bx + tw/2 + 5, by + 2 - br);
            ctx.quadraticCurveTo(bx + tw/2 + 5, by + 2, bx + tw/2 + 5 - br, by + 2);
            ctx.lineTo(bx - tw/2 - 5 + br, by + 2);
            ctx.quadraticCurveTo(bx - tw/2 - 5, by + 2, bx - tw/2 - 5, by + 2 - br);
            ctx.lineTo(bx - tw/2 - 5, by - 8 + br);
            ctx.quadraticCurveTo(bx - tw/2 - 5, by - 8, bx - tw/2 - 5 + br, by - 8);
            ctx.closePath();
            ctx.fill();
            // Badge text
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText(label, bx, by - 1);
        }
    </script>
    <script src="js/sw-update.js"></script>
    <script src="js/pwa-install.js"></script>
