    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.1/dist/umd/supabase.min.js" integrity="sha384-nBSomYN4UWX4we7Pw5GsQDkjtwLh2Wde+3szWl5Lzf0zuN9XncHIZLNoucos4C7f" crossorigin="anonymous"></script>
    <script src="js/supabase-client.js?v=1"></script>
    <script src="js/ui.js?v=2"></script>
    <script src="js/data.js?v=61"></script>
    <script src="js/auth.js?v=22"></script>
    <!-- chart-mini.js non serve: usa drawDarkLineChart() interno -->
    <script>
        let _allView = 'scheda';
        let _allPlan = null;
        let _allPlans = [];  // tutte le schede (attive e vecchie)
        let _allLogs = [];

        function switchAllView(view) {
            _allView = view;
            document.getElementById('pillScheda').classList.toggle('active', view === 'scheda');
            document.getElementById('pillProgressi').classList.toggle('active', view === 'progressi');
            if (view === 'scheda') renderScheda();
            else renderProgressi();
        }

        // ── Gating ────────────────────────────────────────────────────────
        const ALLENAMENTO_ALLOWED_UID = 'cf5f39f3-1581-40be-80e9-15b56acee337';

        // ── Init ──────────────────────────────────────────────────────────
        (async function() {
            await initAuth();
            const user = getCurrentUser();

            // Redirect non-allowed users
            if (!user || user.id !== ALLENAMENTO_ALLOWED_UID) {
                window.location.replace('/');
                return;
            }

            try {
                // Fetch ALL plans (active + old)
                const { data: plans, error } = await supabaseClient
                    .from('workout_plans')
                    .select('*, workout_exercises(*)')
                    .eq('user_id', user.id)
                    .order('active', { ascending: false })
                    .order('updated_at', { ascending: false });

                if (error) throw error;
                if (!plans?.length) {
                    document.getElementById('allContent').innerHTML =
                        '<div class="all-empty">Nessuna scheda assegnata dal trainer.<br>Contattalo per riceverne una!</div>';
                    return;
                }

                // Sort exercises within each plan
                for (const p of plans) {
                    p.workout_exercises = (p.workout_exercises || []).sort((a, b) => a.sort_order - b.sort_order);
                }

                _allPlans = plans;
                _allPlan = plans.find(p => p.active) || plans[0];

                // Build plan selector if multiple plans
                _renderPlanSelector();

                // Fetch logs for current plan
                await _loadLogsForPlan(_allPlan);

                renderScheda();
            } catch (e) {
                console.error('[Allenamento] init error:', e);
                document.getElementById('allContent').innerHTML = '<div class="all-empty">Errore caricamento scheda.</div>';
            }
        })();

        // ── Plan selector ─────────────────────────────────────────────────
        function _renderPlanSelector() {
            if (_allPlans.length <= 1) return;
            const nav = document.querySelector('.all-nav');
            if (!nav) return;
            // Insert selector before the nav pills
            const existing = document.getElementById('allPlanSelector');
            if (existing) existing.remove();
            const sel = document.createElement('div');
            sel.id = 'allPlanSelector';
            sel.className = 'all-plan-selector';
            sel.innerHTML = `<select onchange="switchPlan(this.value)">
                ${_allPlans.map(p => {
                    const label = _escHtml(p.name) + (p.active ? ' (attiva)' : '');
                    return `<option value="${p.id}" ${p.id === _allPlan.id ? 'selected' : ''}>${label}</option>`;
                }).join('')}
            </select>`;
            nav.parentNode.insertBefore(sel, nav);
        }

        async function switchPlan(planId) {
            const plan = _allPlans.find(p => p.id === planId);
            if (!plan) return;
            _allPlan = plan;
            document.getElementById('allContent').innerHTML = '<div class="all-loading">Caricamento...</div>';
            await _loadLogsForPlan(plan);
            if (_allView === 'scheda') renderScheda();
            else renderProgressi();
        }

        async function _loadLogsForPlan(plan) {
            const user = getCurrentUser();
            if (!user) return;
            const exIds = (plan.workout_exercises || []).map(e => e.id);
            if (exIds.length) {
                const { data: logsData } = await supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .in('exercise_id', exIds)
                    .eq('user_id', user.id)
                    .order('log_date', { ascending: false })
                    .order('set_number', { ascending: true });
                _allLogs = logsData || [];
            } else {
                _allLogs = [];
            }
        }

        // ── Render Scheda ─────────────────────────────────────────────────
        function renderScheda() {
            const container = document.getElementById('allContent');
            if (!_allPlan) return;

            const exercises = _allPlan.workout_exercises;
            const days = [...new Set(exercises.map(e => e.day_label))];
            const today = _localDateStr();
            const todayLogs = _allLogs.filter(l => l.log_date === today);

            let html = '';

            // Plan info card
            html += `<div class="all-plan-card">
                <div class="all-plan-name">${_escHtml(_allPlan.name)}</div>
                ${_allPlan.notes ? `<div class="all-plan-notes">${_escHtml(_allPlan.notes)}</div>` : ''}
                <div class="all-plan-meta">
                    ${exercises.length} esercizi &middot; ${days.length} ${days.length === 1 ? 'giorno' : 'giorni'}
                    ${_allPlan.start_date ? ' &middot; dal ' + _fmtDateAll(_allPlan.start_date) : ''}
                </div>
            </div>`;

            // Day sections
            for (const day of days) {
                const dayExercises = exercises.filter(e => e.day_label === day);
                html += `<div class="all-day">
                    <div class="all-day-header">
                        <span class="all-day-label">${_escHtml(day)}</span>
                        <span class="all-day-count">${dayExercises.length} esercizi</span>
                    </div>`;

                for (const ex of dayExercises) {
                    const target = `${ex.sets} × ${ex.reps}${ex.weight_kg != null ? ' @ ' + ex.weight_kg + ' kg' : ''}`;
                    const hasLogs = todayLogs.some(l => l.exercise_id === ex.id);

                    html += `<div class="all-ex-card ${hasLogs ? 'all-ex-done' : ''}" id="ex-${ex.id}">
                        <div class="all-ex-header" onclick="toggleExCard('${ex.id}')">
                            <div class="all-ex-info">
                                <div class="all-ex-name">${_escHtml(ex.exercise_name)}</div>
                                <div class="all-ex-target">${target}${ex.rest_seconds ? ' &middot; rec. ' + ex.rest_seconds + 's' : ''}</div>
                            </div>
                            <div class="all-ex-status">${hasLogs ? '<span class="all-ex-check">&#10003;</span>' : '<span class="all-ex-chevron">&#9662;</span>'}</div>
                        </div>
                        <div class="all-ex-body">
                            ${ex.notes ? `<div class="all-ex-note">${_escHtml(ex.notes)}</div>` : ''}
                            <div class="all-log-section" data-ex-id="${ex.id}">
                                <div class="all-log-header">Registra per oggi — ${_fmtDateAll(today)}</div>
                                <div class="all-log-grid">
                                    <div class="all-log-grid-header">
                                        <span>Serie</span><span>Reps</span><span>Kg</span><span>RPE</span>
                                    </div>`;

                    for (let s = 1; s <= ex.sets; s++) {
                        const existing = todayLogs.find(l => l.exercise_id === ex.id && l.set_number === s);
                        const rVal = existing?.reps_done ?? (parseInt(ex.reps) || '');
                        const wVal = existing?.weight_done ?? (ex.weight_kg ?? '');
                        const rpeVal = existing?.rpe ?? '';
                        html += `<div class="all-log-row">
                            <span class="all-log-set">${s}</span>
                            <input type="number" inputmode="numeric" min="0" value="${rVal}" class="all-log-input" data-field="reps" data-set="${s}">
                            <input type="number" inputmode="decimal" min="0" step="0.5" value="${wVal}" class="all-log-input" data-field="weight" data-set="${s}">
                            <input type="number" inputmode="numeric" min="1" max="10" value="${rpeVal}" class="all-log-input all-log-input--sm" data-field="rpe" data-set="${s}" placeholder="—">
                        </div>`;
                    }

                    html += `</div>
                                <button class="all-log-save" onclick="saveLog('${ex.id}', ${ex.sets}, this)">Salva</button>
                            </div>
                        </div>
                    </div>`;
                }
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function toggleExCard(exId) {
            const card = document.getElementById('ex-' + exId);
            if (card) card.classList.toggle('open');
        }

        async function saveLog(exerciseId, totalSets, btn) {
            const user = getCurrentUser();
            if (!user) return;
            const section = btn.closest('.all-log-section');
            const today = _localDateStr();
            btn.disabled = true;
            btn.textContent = 'Salvataggio...';
            try {
                for (let s = 1; s <= totalSets; s++) {
                    const reps = section.querySelector(`input[data-field="reps"][data-set="${s}"]`);
                    const weight = section.querySelector(`input[data-field="weight"][data-set="${s}"]`);
                    const rpe = section.querySelector(`input[data-field="rpe"][data-set="${s}"]`);
                    await WorkoutLogStorage.logSet({
                        exercise_id: exerciseId,
                        user_id: user.id,
                        log_date: today,
                        set_number: s,
                        reps_done: reps.value ? parseInt(reps.value) : null,
                        weight_done: weight.value ? parseFloat(weight.value) : null,
                        rpe: rpe.value ? parseInt(rpe.value) : null,
                    });
                }
                btn.textContent = 'Salvato!';
                btn.classList.add('all-log-save--done');
                const card = document.getElementById('ex-' + exerciseId);
                if (card) card.classList.add('all-ex-done');
                // Update local logs
                const { data } = await supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .eq('exercise_id', exerciseId)
                    .eq('user_id', user.id)
                    .eq('log_date', today);
                if (data) {
                    _allLogs = _allLogs.filter(l => !(l.exercise_id === exerciseId && l.log_date === today));
                    _allLogs.push(...data);
                }
                if (typeof showToast === 'function') showToast('Log salvato', 'success');
                setTimeout(() => { btn.textContent = 'Salva'; btn.disabled = false; btn.classList.remove('all-log-save--done'); }, 2000);
            } catch (e) {
                console.error('[Allenamento] log error:', e);
                btn.textContent = 'Salva';
                btn.disabled = false;
                if (typeof showToast === 'function') showToast('Errore salvataggio', 'error');
            }
        }

        // ── Render Progressi ──────────────────────────────────────────────
        // Raggruppa per NOME esercizio (non per ID), così log dello stesso
        // esercizio da schede/giorni diversi confluiscono in un unico grafico.
        async function renderProgressi() {
            const container = document.getElementById('allContent');
            const user = getCurrentUser();
            if (!user) return;

            container.innerHTML = '<div class="all-loading">Caricamento progressi...</div>';

            try {
                // Fetch ALL user's plans (anche inattivi) per avere tutti gli exercise IDs
                const { data: allPlans } = await supabaseClient
                    .from('workout_plans')
                    .select('id, workout_exercises(id, exercise_name, muscle_group, sets, reps, weight_kg)')
                    .eq('user_id', user.id);

                const allExercises = (allPlans || []).flatMap(p => p.workout_exercises || []);
                const allExIds = allExercises.map(e => e.id);
                if (!allExIds.length) {
                    container.innerHTML = '<div class="all-empty">Nessun esercizio nelle tue schede.</div>';
                    return;
                }

                // Fetch ALL logs for this user's exercises
                const { data: logs } = await supabaseClient
                    .from('workout_logs')
                    .select('*')
                    .in('exercise_id', allExIds)
                    .eq('user_id', user.id)
                    .order('log_date', { ascending: true });

                if (!logs?.length) {
                    container.innerHTML = '<div class="all-empty">Nessun log registrato ancora.<br>Inizia ad allenarti per vedere i progressi!</div>';
                    return;
                }

                // Map exercise_id → { name, muscle_group }
                const idToName = {};
                const idToMuscle = {};
                for (const ex of allExercises) {
                    idToName[ex.id] = ex.exercise_name;
                    idToMuscle[ex.id] = ex.muscle_group || '';
                }

                // Map exercise_name → muscle_group (first found)
                const nameToMuscle = {};
                for (const ex of allExercises) {
                    if (ex.muscle_group && !nameToMuscle[ex.exercise_name]) {
                        nameToMuscle[ex.exercise_name] = ex.muscle_group;
                    }
                }

                // Group logs by exercise NAME
                const logsByName = {};
                for (const l of logs) {
                    const name = idToName[l.exercise_id] || 'Sconosciuto';
                    if (!logsByName[name]) logsByName[name] = [];
                    logsByName[name].push(l);
                }

                // Get current target from active plan (if available)
                const activeExercises = _allPlan?.workout_exercises || [];
                const targetByName = {};
                for (const ex of activeExercises) {
                    targetByName[ex.exercise_name] = { sets: ex.sets, reps: ex.reps, weight_kg: ex.weight_kg };
                }

                // Available muscle groups (from data)
                const muscleGroups = [...new Set(Object.values(nameToMuscle).filter(Boolean))].sort();

                // Read active filters
                const filterPeriod = document.getElementById('filterPeriod')?.value || 'all';
                const filterMuscle = document.getElementById('filterMuscle')?.value || 'all';

                // Apply time filter to logs
                let filteredLogs = logs;
                if (filterPeriod !== 'all') {
                    const now = new Date();
                    let cutoff;
                    if (filterPeriod === '7d') cutoff = new Date(now.getTime() - 7 * 86400000);
                    else if (filterPeriod === '30d') cutoff = new Date(now.getTime() - 30 * 86400000);
                    else if (filterPeriod === '90d') cutoff = new Date(now.getTime() - 90 * 86400000);
                    if (cutoff) {
                        const cutoffStr = _localDateStr(cutoff);
                        filteredLogs = logs.filter(l => l.log_date >= cutoffStr);
                    }
                }

                // Re-group filtered logs by name
                const filteredByName = {};
                for (const l of filteredLogs) {
                    const name = idToName[l.exercise_id] || 'Sconosciuto';
                    if (!filteredByName[name]) filteredByName[name] = [];
                    filteredByName[name].push(l);
                }

                // Apply muscle filter
                let exerciseNames = Object.keys(filteredByName).sort();
                if (filterMuscle !== 'all') {
                    exerciseNames = exerciseNames.filter(n => nameToMuscle[n] === filterMuscle);
                }

                let html = '';

                // Filters bar
                html += `<div class="all-filters">
                    <select id="filterPeriod" onchange="renderProgressi()">
                        <option value="all" ${filterPeriod === 'all' ? 'selected' : ''}>Tutto</option>
                        <option value="7d" ${filterPeriod === '7d' ? 'selected' : ''}>Ultimi 7 giorni</option>
                        <option value="30d" ${filterPeriod === '30d' ? 'selected' : ''}>Ultimi 30 giorni</option>
                        <option value="90d" ${filterPeriod === '90d' ? 'selected' : ''}>Ultimi 90 giorni</option>
                    </select>
                    <select id="filterMuscle" onchange="renderProgressi()">
                        <option value="all" ${filterMuscle === 'all' ? 'selected' : ''}>Tutti i muscoli</option>
                        ${muscleGroups.map(mg => `<option value="${_escHtml(mg)}" ${filterMuscle === mg ? 'selected' : ''}>${_escHtml(mg)}</option>`).join('')}
                    </select>
                </div>`;

                // Stats overview (filtered)
                // Filter logs for stats based on muscle filter too
                const statsLogs = filterMuscle === 'all' ? filteredLogs
                    : filteredLogs.filter(l => nameToMuscle[idToName[l.exercise_id]] === filterMuscle);
                const totalSessions = new Set(statsLogs.map(l => l.exercise_id + '|' + l.log_date)).size;
                const totalSets = statsLogs.length;
                const totalVolume = statsLogs.reduce((sum, l) => sum + ((l.weight_done || 0) * (l.reps_done || 0)), 0);
                html += `<div class="all-stats-row">
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalSessions}</div>
                        <div class="all-stat-label">Sessioni</div>
                    </div>
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalSets}</div>
                        <div class="all-stat-label">Serie totali</div>
                    </div>
                    <div class="all-stat-card">
                        <div class="all-stat-value">${totalVolume >= 1000 ? (totalVolume/1000).toFixed(1) + 't' : totalVolume + 'kg'}</div>
                        <div class="all-stat-label">Volume totale</div>
                    </div>
                </div>`;

                // Per-exercise-NAME progress charts (sorted, filtered)
                let chartIdx = 0;
                if (!exerciseNames.length && (filterMuscle !== 'all' || filterPeriod !== 'all')) {
                    html += '<div class="all-empty">Nessun risultato per i filtri selezionati.</div>';
                }
                for (const exName of exerciseNames) {
                    const exLogs = filteredByName[exName];
                    if (!exLogs?.length) continue;

                    // Raggruppa per (exercise_id, log_date) — max weight per sessione
                    const sessionMap = {};  // key = "exId|date" → { date, weight, dateObj }
                    for (const l of exLogs) {
                        if (l.weight_done == null) continue;
                        const key = l.exercise_id + '|' + l.log_date;
                        if (!sessionMap[key] || l.weight_done > sessionMap[key].weight) {
                            sessionMap[key] = { date: l.log_date, weight: l.weight_done };
                        }
                    }
                    // Ordina per data, poi per peso (se stessa data, mostra entrambi)
                    const sessions = Object.values(sessionMap).sort((a, b) =>
                        a.date.localeCompare(b.date) || a.weight - b.weight
                    );
                    if (!sessions.length) continue;

                    const values = sessions.map(s => s.weight);
                    // Se più sessioni nella stessa data, numera: "31 mar (1)", "31 mar (2)"
                    const dateCounts = {};
                    const labels = sessions.map(s => {
                        const fmt = _fmtDateAll(s.date);
                        dateCounts[s.date] = (dateCounts[s.date] || 0) + 1;
                        return fmt;
                    });
                    // Disambigua label duplicate
                    const dateOccurrences = {};
                    for (let i = 0; i < labels.length; i++) {
                        const d = sessions[i].date;
                        if (dateCounts[d] > 1) {
                            dateOccurrences[d] = (dateOccurrences[d] || 0) + 1;
                            labels[i] += ' (' + dateOccurrences[d] + ')';
                        }
                    }

                    const maxW = Math.max(...values);
                    const lastW = values[values.length - 1];
                    const trend = values.length >= 2 ? lastW - values[0] : 0;
                    const trendSign = trend > 0 ? '+' : '';
                    const trendClass = trend > 0 ? 'all-trend-up' : trend < 0 ? 'all-trend-down' : '';
                    const target = targetByName[exName];
                    const targetStr = target
                        ? `Target: ${target.sets}×${target.reps}${target.weight_kg != null ? ' @ ' + target.weight_kg + 'kg' : ''}`
                        : '';

                    const canvasId = 'pchart-' + (chartIdx++);
                    html += `<div class="all-progress-card">
                        <div class="all-progress-header">
                            <div class="all-progress-name">${_escHtml(exName)}</div>
                            ${targetStr ? `<div class="all-progress-meta">${targetStr}</div>` : ''}
                        </div>
                        <canvas id="${canvasId}" width="320" height="140"></canvas>
                        <div class="all-progress-stats">
                            <span>Max <strong>${maxW}kg</strong></span>
                            <span>Ultimo <strong>${lastW}kg</strong></span>
                            <span class="${trendClass}">Trend <strong>${trendSign}${trend.toFixed(1)}kg</strong></span>
                            <span>${sessions.length} sessioni</span>
                        </div>
                    </div>`;

                    setTimeout(((cid, lbl, val) => () => {
                        const canvas = document.getElementById(cid);
                        if (canvas) drawDarkLineChart(canvas, lbl, val, '#00AEEF');
                    })(canvasId, labels, values), 50);
                }

                // Volume per session chart (filtered)
                const volByDate = {};
                for (const l of statsLogs) {
                    if (l.weight_done != null && l.reps_done != null) {
                        const vol = l.weight_done * l.reps_done;
                        volByDate[l.log_date] = (volByDate[l.log_date] || 0) + vol;
                    }
                }
                const volDates = Object.keys(volByDate).sort();
                if (volDates.length > 1) {
                    const volValues = volDates.map(d => Math.round(volByDate[d]));
                    const volLabels = volDates.map(d => _fmtDateAll(d));
                    const volCanvasId = 'pchart-volume';
                    html += `<div class="all-progress-card all-progress-card--volume">
                        <div class="all-progress-header">
                            <div class="all-progress-name">Volume Totale per Sessione</div>
                        </div>
                        <canvas id="${volCanvasId}" width="320" height="140"></canvas>
                        <div class="all-progress-stats">
                            <span>Max <strong>${Math.max(...volValues)}kg</strong></span>
                            <span>Ultimo <strong>${volValues[volValues.length - 1]}kg</strong></span>
                        </div>
                    </div>`;
                    setTimeout(() => {
                        const canvas = document.getElementById(volCanvasId);
                        if (canvas) drawDarkLineChart(canvas, volLabels, volValues, '#22c55e');
                    }, 50);
                }

                container.innerHTML = html;
            } catch (e) {
                console.error('[Progressi] error:', e);
                container.innerHTML = '<div class="all-empty">Errore caricamento progressi.</div>';
            }
        }

        function _fmtDateAll(iso) {
            if (!iso) return '';
            const d = new Date(iso + 'T00:00:00');
            return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
        }

        // ── Dark-theme line chart (canvas) ────────────────────────────────
        function drawDarkLineChart(canvas, labels, values, color) {
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const w = rect.width > 0 ? rect.width : 320;
            const h = 140;
            canvas.width = Math.round(w * 2);
            canvas.height = Math.round(h * 2);
            ctx.scale(2, 2);

            const pad = { top: 20, right: 12, bottom: 30, left: 40 };
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;

            if (!values.length) return;
            const minV = Math.min(...values);
            const maxV = Math.max(...values);
            const range = maxV - minV || 1;
            const yMin = Math.max(0, minV - range * 0.1);
            const yMax = maxV + range * 0.1;
            const yRange = yMax - yMin || 1;

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + ch - (ch * i / 4);
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(Math.round(yMin + yRange * i / 4), pad.left - 5, y + 3);
            }

            // Points
            const pts = values.map((v, i) => ({
                x: pad.left + (values.length === 1 ? cw / 2 : (i / (values.length - 1)) * cw),
                y: pad.top + ch - ((v - yMin) / yRange) * ch,
                v,
            }));

            // Fill
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pad.top + ch);
            pts.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
            grad.addColorStop(0, color + '40');
            grad.addColorStop(1, color + '05');
            ctx.fillStyle = grad;
            ctx.fill();

            // Line
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();

            // Dots
            pts.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#1a1a2e';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            // X labels
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.font = '8px sans-serif';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(labels.length / 6));
            labels.forEach((lbl, i) => {
                if (i % step === 0 || i === labels.length - 1) {
                    ctx.fillText(lbl, pts[i].x, pad.top + ch + 14);
                }
            });

            // Value on last point
            const last = pts[pts.length - 1];
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(last.v + 'kg', last.x, last.y - 8);
        }
    </script>
    <script src="js/sw-update.js"></script>
    <script src="js/pwa-install.js"></script>
</body>
