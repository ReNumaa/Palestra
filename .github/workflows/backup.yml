name: Backup Supabase → Nextcloud

on:
  # schedule:
  #   - cron: '0 3 * * *'   # 3:00 UTC = 4:00 ora italiana (estate)
  workflow_dispatch:        # trigger manuale dalla UI di GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Esporta tutti i dati da Supabase ─────────────────────────────────
      - name: Export dati da Supabase
        env:
          SUPA_URL: ${{ secrets.SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          echo "DATE=${DATE}" >> $GITHUB_ENV

          # Fetch una tabella intera (fino a 500k righe — abbondantemente sufficiente)
          _fetch() {
            local table="$1"
            local order="${2:-created_at.asc}"
            curl -sf \
              -H "apikey: $SUPA_KEY" \
              -H "Authorization: Bearer $SUPA_KEY" \
              -H "Range: 0-499999" \
              "$SUPA_URL/rest/v1/$table?select=*&order=$order" 2>/dev/null || echo "[]"
          }

          # Scopri tutte le tabelle pubbliche (auto-discovery)
          ALL_TABLES=$(curl -sf \
            -H "apikey: $SUPA_KEY" \
            -H "Authorization: Bearer $SUPA_KEY" \
            "$SUPA_URL/rest/v1/" 2>/dev/null \
            | jq -r '.[].name // empty' 2>/dev/null | sort || echo "")

          echo "Tabelle trovate: $ALL_TABLES"

          # Tabelle note con ordinamento specifico
          declare -A ORDER_MAP=(
            [bookings]="created_at.asc"
            [credits]="created_at.asc"
            [credit_history]="created_at.asc"
            [manual_debts]="created_at.asc"
            [bonuses]="created_at.asc"
            [schedule_overrides]="date.asc,time.asc"
            [settings]="key.asc"
            [profiles]="created_at.asc"
            [push_subscriptions]="created_at.asc"
            [admin_audit_log]="created_at.asc"
            [app_settings]="key.asc"
            [credit_link_clicks]="clicked_at.asc"
          )

          # Se auto-discovery ha funzionato usa quella lista, altrimenti fallback
          if [ -z "$ALL_TABLES" ]; then
            ALL_TABLES="bookings credits credit_history manual_debts bonuses schedule_overrides settings profiles push_subscriptions admin_audit_log app_settings credit_link_clicks"
          fi

          # Costruisci il JSON con jq — una chiave per tabella
          BACKUP="{\"generated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"source\": \"auto-cron\"}"

          for table in $ALL_TABLES; do
            order="${ORDER_MAP[$table]:-created_at.asc}"
            echo "Fetching $table (order: $order)..."
            TABLE_DATA=$(_fetch "$table" "$order")
            BACKUP=$(echo "$BACKUP" | jq --arg t "$table" --argjson d "$TABLE_DATA" '. + {($t): $d}')
          done

          echo "$BACKUP" | jq '.' > "backup_${DATE}.json"

          SIZE=$(du -h "backup_${DATE}.json" | cut -f1)
          echo "SIZE=${SIZE}" >> $GITHUB_ENV

          TABLE_COUNT=$(echo "$BACKUP" | jq 'keys | length')
          echo "✅ Backup creato: backup_${DATE}.json (${SIZE}) — ${TABLE_COUNT} tabelle"

      # ── 2. Upload su Nextcloud via WebDAV ────────────────────────────────────
      - name: Upload su Nextcloud
        env:
          NC_URL:  ${{ secrets.NEXTCLOUD_URL }}
          NC_USER: ${{ secrets.NEXTCLOUD_USER }}
          NC_PASS: ${{ secrets.NEXTCLOUD_PASSWORD }}
        run: |
          FOLDER="${NC_URL}/remote.php/dav/files/${NC_USER}/TB-Training-Backups"
          FILE="backup_${{ env.DATE }}.json"

          # Crea la cartella (ignora errore se esiste già)
          curl -sf -X MKCOL -u "${NC_USER}:${NC_PASS}" "${FOLDER}/" || true

          # Upload
          curl -f -X PUT \
            -u "${NC_USER}:${NC_PASS}" \
            -T "${FILE}" \
            "${FOLDER}/${FILE}"

          echo "✅ Caricato: TB-Training-Backups/${FILE} (${{ env.SIZE }})"

      # ── 3. Mantieni solo gli ultimi 60 backup (2 mesi) ──────────────────────
      - name: Pulizia backup vecchi
        env:
          NC_URL:  ${{ secrets.NEXTCLOUD_URL }}
          NC_USER: ${{ secrets.NEXTCLOUD_USER }}
          NC_PASS: ${{ secrets.NEXTCLOUD_PASSWORD }}
        run: |
          FOLDER="${NC_URL}/remote.php/dav/files/${NC_USER}/TB-Training-Backups"
          KEEP=60

          # Lista file via PROPFIND → estrae nomi backup_YYYY-MM-DD.json → ordina
          NAMES=$(curl -sf -X PROPFIND \
            -u "${NC_USER}:${NC_PASS}" \
            -H "Depth: 1" \
            "${FOLDER}/" \
            | grep -oE 'backup_[0-9]{4}-[0-9]{2}-[0-9]{2}\.json' | sort -u)

          COUNT=$(echo "$NAMES" | grep -c . 2>/dev/null || echo 0)

          if [ "$COUNT" -gt "$KEEP" ]; then
            TO_DEL=$(echo "$NAMES" | head -n $((COUNT - KEEP)))
            echo "Elimino $((COUNT - KEEP)) backup vecchi..."
            while IFS= read -r f; do
              curl -sf -X DELETE -u "${NC_USER}:${NC_PASS}" "${FOLDER}/${f}" && \
                echo "  Eliminato: $f"
            done <<< "$TO_DEL"
          else
            echo "Nessuna pulizia necessaria (${COUNT}/${KEEP} backup presenti)"
          fi
